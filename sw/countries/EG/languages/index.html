const setDarkMode = () => {
    const isDarkModePreferred = () => {
        return localStorage.theme === "dark" ||
               (!("theme" in localStorage) && window.matchMedia("(prefers-color-scheme: dark)").matches);
    };

    const toggleClasses = (element, condition, classesOn, classesOff) => {
        classesOn.forEach(cls => element.classList.toggle(cls, condition));
        classesOff.forEach(cls => element.classList.toggle(cls, !condition));
    };

    const toggleDarkMode = () => {
        const isDark = document.documentElement.classList.toggle("dark");
        updateTogglerUI(isDark);
        localStorage.theme = isDark ? "dark" : "light";
    };

    const preferredDarkMode = isDarkModePreferred();
    document.documentElement.classList.toggle("dark", preferredDarkMode);
    attachEvent("[data-aw-toggle-color-scheme]", "click", toggleDarkMode);
};



    document.addEventListener("DOMContentLoaded", setDarkMode);

  function attachEvent(selector, event, fn) {
    const matches = document.querySelectorAll(selector)
    if (matches && matches.length) {
      matches.forEach((elem) => {
        elem.addEventListener(
          event,
          function () {
            fn(elem)
          },
          false
        )
      })
    }
  }

quot;EGY&quot;],&quot;continent_id&quot;:[0,&quot;AF&quot;],&quot;iso_num&quot;:[0,818],&quot;language_count&quot;:[0,38],&quot;religion_primary&quot;:[0,&quot;Islam&quot;],&quot;introduction&quot;:[0,&quot;The regularity and richness of the annual Nile River flood coupled with semi-isolation provided by deserts to the east and west allowed for the development of one of the world&#39;s great civilizations. A unified kingdom arose circa 3200 B.C. and a series of dynasties ruled in Egypt for the next three millennia. The last native dynasty fell to the Persians in 341 B.C. who in turn were replaced by the Greeks Romans and Byzantines. It was the Arabs who introduced Islam and the Arabic language in the 7th century and who ruled for the next six centuries. A local military caste the Mamluks took control about 1250 and continued to govern after the conquest of Egypt by the Ottoman Turks in 1517. Completion of the Suez Canal in 1869 elevated Egypt as an important world transportation hub. Ostensibly to protect its investments Britain seized control of Egypt&#39;s government in 1882 but nominal allegiance to the Ottoman Empire continued until 1914. Partially independent from the UK in 1922 Egypt acquired full sovereignty from Britain in 1952. The completion of the Aswan High Dam in 1971 and the resultant Lake Nasser have altered the time-honored place of the Nile River in the agriculture and ecology of Egypt. A rapidly growing population (the largest in the Arab world) limited arable land and dependence on the Nile all continue to overtax resources and stress society. The government has struggled to meet the demands of Egypt&#39;s population through economic reform and massive investment in communications and physical infrastructure. ++ Inspired by the 2010 Tunisian revolution Egyptian opposition groups led demonstrations and labor strikes countrywide culminating in President Hosni MUBARAK&#39;s ouster. Egypt&#39;s military assumed national leadership until a new parliament was in place in early 2012; later that same year Mohammed MORSI won the presidential election. Following often violent protests throughout the spring of 2013 against MORSI&#39;s government and the Muslim Brotherhood the Egyptian Armed Forces intervened and removed MORSI from power in July 2013 and replaced him with interim president Adly MANSOUR. In January 2014 voters approved a new constitution by referendum and in May 2014 elected Abdel Fattah EL SISI president. Egypt elected a new legislature in December 2015 the first parliament since 2012.&quot;],&quot;overview&quot;:[0,&quot;&#39;Egypt a country linking northeast Africa with the Middle East dates to the time of the pharaohs. Millennia-old monuments sit along the fertile Nile River Valley including Giza&#39;&#39;s colossal Pyramids and Great Sphinx as well as Luxor&#39;&#39;s hieroglyph-lined Karnak Temple and Valley of the Kings tombs. The capital Cairo is home to Ottoman landmarks like Muhammad Ali Mosque and the Egyptian Museum a trove of antiquities.&#39;&quot;],&quot;independent&quot;:[0,1],&quot;landmass_km&quot;:[0,995450],&quot;population_christian&quot;:[0,9029000],&quot;population_christian_percentage&quot;:[0,10],&quot;population_refugee&quot;:[0,258401],&quot;population_migration&quot;:[0,-38033],&quot;population_year_change&quot;:[0,1.94],&quot;population_density_km&quot;:[0,103],&quot;population_average_age&quot;:[0,25],&quot;population_urban_percentage&quot;:[0,43],&quot;population_literacy_percentage&quot;:[0,75],&quot;region_code&quot;:[0,6],&quot;region_id&quot;:[0,15],&quot;region_name&quot;:[0,&quot;Northern Africa&quot;],&quot;url_wiki&quot;:[0,&quot;https://en.wikipedia.org/wiki/Egypt&quot;],&quot;url_britannica&quot;:[0,&quot;https://www.britannica.com/place/Egypt&quot;],&quot;url_national_society&quot;:[0,&quot;http://sbuec.org/&quot;],&quot;url_ubs&quot;:[0,&quot;https://unitedbiblesocieties.org/locations/bible-society-of-egypt/&quot;],&quot;url_factbook&quot;:[0,&quot;https://www.c
