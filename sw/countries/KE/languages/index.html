const setDarkMode = () => {
    const isDarkModePreferred = () => {
        return localStorage.theme === "dark" ||
               (!("theme" in localStorage) && window.matchMedia("(prefers-color-scheme: dark)").matches);
    };

    const toggleClasses = (element, condition, classesOn, classesOff) => {
        classesOn.forEach(cls => element.classList.toggle(cls, condition));
        classesOff.forEach(cls => element.classList.toggle(cls, !condition));
    };

    const toggleDarkMode = () => {
        const isDark = document.documentElement.classList.toggle("dark");
        updateTogglerUI(isDark);
        localStorage.theme = isDark ? "dark" : "light";
    };

    const preferredDarkMode = isDarkModePreferred();
    document.documentElement.classList.toggle("dark", preferredDarkMode);
    attachEvent("[data-aw-toggle-color-scheme]", "click", toggleDarkMode);
};

  function attachEvent(selector, event, fn) {
    const matches = document.querySelectorAll(selector)
    if (matches && matches.length) {
      matches.forEach((elem) => {
        elem.addEventListener(
          event,
          function () {
            fn(elem)
          },
          false
        )
      })
    }
  }

],&quot;continent_id&quot;:[0,&quot;AF&quot;],&quot;iso_num&quot;:[0,404],&quot;language_count&quot;:[0,92],&quot;religion_primary&quot;:[0,&quot;Christianity&quot;],&quot;introduction&quot;:[0,&quot;Founding president and liberation struggle icon Jomo KENYATTA led Kenya from independence in 1963 until his death in 1978 when President Daniel MOI took power in a constitutional succession. The country was a de facto one-party state from 1969 until 1982 when the ruling Kenya African National Union (KANU) made itself the sole legal party in Kenya. MOI acceded to internal and external pressure for political liberalization in late 1991. The ethnically fractured opposition failed to dislodge KANU from power in elections in 1992 and 1997 which were marred by violence and fraud but were viewed as having generally reflected the will of the Kenyan people. President MOI stepped down in December 2002 following fair and peaceful elections. Mwai KIBAKI running as the candidate of the multiethnic united opposition group the National Rainbow Coalition (NARC) defeated KANU candidate Uhuru KENYATTA and assumed the presidency following a campaign centered on an anticorruption platform. KIBAKI&#39;s NARC coalition splintered in 2005 over a constitutional review process. Government defectors joined with KANU to form a new opposition coalition the Orange Democratic Movement (ODM) which defeated the government&#39;s draft constitution in a popular referendum in November 2005. KIBAKI&#39;s reelection in December 2007 brought charges of vote rigging from ODM candidate Raila ODINGA and unleashed two months of violence in which as many as 1500 people died. African Union-sponsored mediation led by former UN Secretary General Kofi ANNAN in late February 2008 resulted in a power-sharing accord bringing ODINGA into the government in the restored position of prime minister. The power sharing accord included a broad reform agenda the centerpiece of which was constitutional reform. In August 2010 Kenyans overwhelmingly adopted a new constitution in a national referendum. The new constitution introduced additional checks and balances to executive power and significant devolution of power and resources to 47 newly created counties. It also eliminated the position of prime minister following the first presidential election under the new constitution which occurred on 4 March 2013. Uhuru KENYATTA the son of founding president Jomo KENYATTA won the March elections in the first round by a close margin and was sworn into office on 9 April 2013.&quot;],&quot;overview&quot;:[0,&quot;&#39;Kenya is a country in East Africa with coastline on the Indian Ocean. It encompasses savannah lakelands the dramatic Great Rift Valley and mountain highlands. It&#39;&#39;s also home to wildlife like lions elephants and rhinos. From Nairobi the capital safaris visit the Maasai Mara Reserve known for its annual wildebeest migrations and Amboseli National Park offering views of Tanzania&#39;&#39;s 5895m Mt. Kilimanjaro.&#39;&quot;],&quot;independent&quot;:[0,1],&quot;landmass_km&quot;:[0,569140],&quot;population_christian&quot;:[0,34774000],&quot;population_christian_percentage&quot;:[0,85.1],&quot;population_catholic_percentage&quot;:[0,23.4],&quot;population_protestant_percentage&quot;:[0,61.7],&quot;population_refugee&quot;:[0,438901],&quot;population_migration&quot;:[0,-10000],&quot;population_year_change&quot;:[0,2.28],&quot;population_density_km&quot;:[0,94],&quot;population_average_age&quot;:[0,20],&quot;population_urban_percentage&quot;:[0,28],&quot;population_literacy_percentage&quot;:[0,82],&quot;region_code&quot;:[0,7],&quot;region_id&quot;:[0,202],&quot;region_name&quot;:[0,&quot;Sub-Saharan Africa&quot;],&quot;url_wiki&quot;:[0,&quot;https://en.wikipedia.org/wiki/Kenya&quot;],&quot;url_britannica&quot;:[0,&quot;https://www.britannica.com/place/Kenya&quot;],&quot;url_national_society&quot;:[0,&quot;http://www.biblesociety-kenya.org/&quot;],&quot;url_ubs&quot;:[0,&quot;https://
