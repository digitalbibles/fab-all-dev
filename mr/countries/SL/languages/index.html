const setDarkMode = () => {
    const isDarkModePreferred = () => {
        return localStorage.theme === "dark" ||
               (!("theme" in localStorage) && window.matchMedia("(prefers-color-scheme: dark)").matches);
    };

    const toggleClasses = (element, condition, classesOn, classesOff) => {
        classesOn.forEach(cls => element.classList.toggle(cls, condition));
        classesOff.forEach(cls => element.classList.toggle(cls, !condition));
    };

    const toggleDarkMode = () => {
        const isDark = document.documentElement.classList.toggle("dark");
        updateTogglerUI(isDark);
        localStorage.theme = isDark ? "dark" : "light";
    };

    const preferredDarkMode = isDarkModePreferred();
    document.documentElement.classList.toggle("dark", preferredDarkMode);
    attachEvent("[data-aw-toggle-color-scheme]", "click", toggleDarkMode);
};



    document.addEventListener("DOMContentLoaded", setDarkMode);

  function attachEvent(selector, event, fn) {
    const matches = document.querySelectorAll(selector)
    if (matches && matches.length) {
      matches.forEach((elem) => {
        elem.addEventListener(
          event,
          function () {
            fn(elem)
          },
          false
        )
      })
    }
  }

SLE&quot;],&quot;continent_id&quot;:[0,&quot;AF&quot;],&quot;iso_num&quot;:[0,694],&quot;language_count&quot;:[0,30],&quot;religion_primary&quot;:[0,&quot;Islam&quot;],&quot;introduction&quot;:[0,&quot;The British set up a trading post near present-day Freetown in the 17th century. Originally the trade involved timber and ivory but later it expanded into slaves. Following the American Revolution a colony was established in 1787 and Sierra Leone became a destination for resettling black loyalists who had originally been resettled in Nova Scotia. After the abolition of the slave trade in 1807 British crews delivered thousands of Africans liberated from illegal slave ships to Sierra Leone particularly Freetown. The colony gradually expanded inland during the course of the 19th century; independence was attained in 1961. Democracy is slowly being reestablished after the civil war (1991-2002) that resulted in tens of thousands of deaths and the displacement of more than 2 million people (about one third of the population). The military which took over full responsibility for security following the departure of UN peacekeepers at the end of 2005 has developed as a guarantor of the country&#39;s stability; the armed forces remained on the sideline during the 2007 and 2012 national elections. In March 2014 the closure of the UN Integrated Peacebuilding Office in Sierra Leone marked the end of more than 15 years of peacekeeping and political operations in Sierra Leone. The government&#39;s stated priorities include furthering development - including recovering from the Ebola epidemic - creating jobs and stamping out endemic corruption.&quot;],&quot;overview&quot;:[0,&quot;Sierra Leone is a country in West Africa on the Atlantic Ocean. It’s known for the white-sand beaches lining the Freetown Peninsula. The capital city Freetown commemorates the nation’s slave-trade history with the Cotton Tree landmark and King’s Yard Gate. Both were known as places of refuge for returned slaves in the 18th and 19th centuries. Nearby Bunce Island was a key departure point during the slave trade.&quot;],&quot;independent&quot;:[0,1],&quot;landmass_km&quot;:[0,72180],&quot;population_christian&quot;:[0,1294000],&quot;population_christian_percentage&quot;:[0,20.9],&quot;population_refugee&quot;:[0,443],&quot;population_migration&quot;:[0,-4200],&quot;population_year_change&quot;:[0,2.1],&quot;population_density_km&quot;:[0,111],&quot;population_average_age&quot;:[0,19],&quot;population_urban_percentage&quot;:[0,43],&quot;population_literacy_percentage&quot;:[0,46],&quot;region_code&quot;:[0,8],&quot;region_id&quot;:[0,202],&quot;region_name&quot;:[0,&quot;Sub-Saharan Africa&quot;],&quot;url_wiki&quot;:[0,&quot;https://en.wikipedia.org/wiki/Sierra_Leone&quot;],&quot;url_britannica&quot;:[0,&quot;https://www.britannica.com/place/Sierra-Leone&quot;],&quot;url_national_society&quot;:[0,&quot;https://www.svetopismo.si/&quot;],&quot;url_ubs&quot;:[0,&quot;https://unitedbiblesocieties.org/locations/bible-society-of-slovenia/&quot;],&quot;url_factbook&quot;:[0,&quot;https://www.cia.gov/the-world-factbook/countries/sierra-leone/&quot;],&quot;url_factbook_pdf&quot;:[0,&quot;https://images.bible.cloud/maps/summary/SL-summary.pdf&quot;],&quot;url_human_development&quot;:[0,&quot;https://hdr.undp.org/data-center/specific-country-data#/countries/SLE&quot;],&quot;url_nations_online&quot;:[0,&quot;https://www.nationsonline.org/oneworld/sierra_leone.htm&quot;],&quot;url_odp&quot;:[0,&quot;https://curlie.org/Regional/Africa/Sierra_Leone&quot;],&quot;url_operation_world&quot;:[0,&quot;https://operationworld.org/locations/sierra-leone&quot;],&quot;url_religious_freedom&quot;:[0,&quot;https://www.state.gov/countries-areas/sierra-leone/&quot;],&quot;url_joshua&quot;:[0,&quot;https://joshuaproject.net/countries/SL&quot;],&quot;url_prayercast&quot;:[0,&quot;https://prayercast.com/sierra-leone.html&quot;],&quot;url_prayercast_video&quot;:[0,&quot;https://player.vimeo.com/video/70
