const setDarkMode = () => {
    const isDarkModePreferred = () => {
        return localStorage.theme === "dark" ||
               (!("theme" in localStorage) && window.matchMedia("(prefers-color-scheme: dark)").matches);
    };

    const toggleClasses = (element, condition, classesOn, classesOff) => {
        classesOn.forEach(cls => element.classList.toggle(cls, condition));
        classesOff.forEach(cls => element.classList.toggle(cls, !condition));
    };

    const toggleDarkMode = () => {
        const isDark = document.documentElement.classList.toggle("dark");
        updateTogglerUI(isDark);
        localStorage.theme = isDark ? "dark" : "light";
    };

    const preferredDarkMode = isDarkModePreferred();
    document.documentElement.classList.toggle("dark", preferredDarkMode);
    attachEvent("[data-aw-toggle-color-scheme]", "click", toggleDarkMode);
};

  function attachEvent(selector, event, fn) {
    const matches = document.querySelectorAll(selector)
    if (matches && matches.length) {
      matches.forEach((elem) => {
        elem.addEventListener(
          event,
          function () {
            fn(elem)
          },
          false
        )
      })
    }
  }

quot;continent_id&quot;:[0,&quot;AF&quot;],&quot;iso_num&quot;:[0,729],&quot;language_count&quot;:[0,111],&quot;religion_primary&quot;:[0,&quot;Christianity&quot;],&quot;introduction&quot;:[0,&quot;Military regimes favoring Islamic-oriented governments have dominated national politics since independence from Anglo-Egyptian co rule in 1956. Sudan was embroiled in two prolonged civil wars during most of the remainder of the 20th century. These conflicts were rooted in northern economic political and social domination of largely non-Muslim non-Arab southern Sudanese. The first civil war ended in 1972 but another broke out in 1983. Peace talks gained momentum in 2002-04 with the signing of several accords. The final North/South Comprehensive Peace Agreement (CPA) signed in January 2005 granted the southern rebels autonomy for six years followed by a referendum on independence for Southern Sudan. The referendum was held in January 2011 and indicated overwhelming support for independence. South Sudan became independent on 9 July 2011. Sudan and South Sudan have yet to fully implement security and economic agreements signed on September 27 2012 relating to the normalization of relations between the two countries. The final disposition of the contested Abyei region has also to be decided. Since South Sudan&#39;s independence conflict has broken out between the government and the Sudan People&#39;s Liberation Movement-North (SPLM-N) in Southern Kordofan and Blue Nile states which has resulted in 1.2 million internally displaced persons or severely affected persons in need of humanitarian assistance. A separate conflict which broke out in the western region of Darfur in 2003 has displaced nearly two million people and caused an estimated 200000 to 400000 deaths. Violence in Darfur in 2013 resulted in an additional estimated 6000 civilians killed and 500000 displaced. The UN and the African Union have jointly commanded a Darfur peacekeeping operation known as the African Union-United Nations Hybrid Mission in Darfur (UNAMID) since 2007. Peacekeeping troops have struggled to stabilize the situation and have increasingly become targets for attacks by armed groups. In 2013 16 peacekeepers were killed UNAMID&#39;s deadliest year so far. Sudan also has faced refugee influxes from neighboring countries primarily Ethiopia Eritrea Chad Central African Republic and South Sudan. Armed conflict poor transport infrastructure and government denial of access have impeded the provision of humanitarian assistance to affected populations.&quot;],&quot;overview&quot;:[0,&quot;&#39;The Sudan or Sudan also known as North Sudan since South Sudan&#39;&#39;s independence and officially the Republic of the Sudan is a country in Northeast Africa.&#39;&quot;],&quot;independent&quot;:[0,1],&quot;landmass_km&quot;:[0,1765048],&quot;population_christian&quot;:[0,525000],&quot;population_christian_percentage&quot;:[0,1.5],&quot;population_refugee&quot;:[0,1055489],&quot;population_migration&quot;:[0,-50000],&quot;population_year_change&quot;:[0,2.42],&quot;population_density_km&quot;:[0,25],&quot;population_average_age&quot;:[0,20],&quot;population_urban_percentage&quot;:[0,35],&quot;population_literacy_percentage&quot;:[0,96],&quot;region_code&quot;:[0,11],&quot;region_id&quot;:[0,15],&quot;region_name&quot;:[0,&quot;Northern Africa&quot;],&quot;url_wiki&quot;:[0,&quot;https://en.wikipedia.org/wiki/Sudan&quot;],&quot;url_britannica&quot;:[0,&quot;https://www.britannica.com/place/Sudan&quot;],&quot;url_national_society&quot;:[0,&quot;http://biblesociety-sudan.org/&quot;],&quot;url_ubs&quot;:[0,&quot;https://unitedbiblesocieties.org/locations/bible-society-in-sudan/&quot;],&quot;url_factbook&quot;:[0,&quot;https://www.cia.gov/the-world-factbook/countries/sudan/&quot;],&quot;url_factbook_pdf&quot;:[0,&quot;https://images.bible.cloud/maps/summary/SU-summary.pdf&quot;],&quot;url_human_development&quot;:[0,&quot;https://hdr.undp.org/data-center/specific-country-data#/coun
