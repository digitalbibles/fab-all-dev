const setDarkMode = () => {
    const isDarkModePreferred = () => {
        return localStorage.theme === "dark" ||
               (!("theme" in localStorage) && window.matchMedia("(prefers-color-scheme: dark)").matches);
    };

    const toggleClasses = (element, condition, classesOn, classesOff) => {
        classesOn.forEach(cls => element.classList.toggle(cls, condition));
        classesOff.forEach(cls => element.classList.toggle(cls, !condition));
    };

    const toggleDarkMode = () => {
        const isDark = document.documentElement.classList.toggle("dark");
        updateTogglerUI(isDark);
        localStorage.theme = isDark ? "dark" : "light";
    };

    const preferredDarkMode = isDarkModePreferred();
    document.documentElement.classList.toggle("dark", preferredDarkMode);
    attachEvent("[data-aw-toggle-color-scheme]", "click", toggleDarkMode);
};



    document.addEventListener("DOMContentLoaded", setDarkMode);

  function attachEvent(selector, event, fn) {
    const matches = document.querySelectorAll(selector)
    if (matches && matches.length) {
      matches.forEach((elem) => {
        elem.addEventListener(
          event,
          function () {
            fn(elem)
          },
          false
        )
      })
    }
  }

quot;continent_id&quot;:[0,&quot;AF&quot;],&quot;iso_num&quot;:[0,232],&quot;language_count&quot;:[0,22],&quot;religion_primary&quot;:[0,&quot;Islam&quot;],&quot;introduction&quot;:[0,&quot;After independence from Italian colonial control in 1941 and 10 years of British administrative control the UN established Eritrea as an autonomous region within the Ethiopian federation in 1952. Ethiopia&#39;s full annexation of Eritrea as a province 10 years later sparked a violent 30-year struggle for independence that ended in 1991 with Eritrean rebels defeating government forces. Eritreans overwhelmingly approved independence in a 1993 referendum. ISAIAS Afworki has been Eritrea&#39;s only president since independence; his rule particularly since 2001 has been highly autocratic and repressive. His government has created a highly militarized society by pursuing an unpopular program of mandatory conscription into national service sometimes of indefinite length. A two-and-a-half-year border war with Ethiopia that erupted in 1998 ended under UN auspices in December 2000. A UN peacekeeping operation was established that monitored a 25 km-wide Temporary Security Zone. The Eritrea-Ethiopia Boundary Commission (EEBC) created in April 2003 was tasked \\\&quot;to delimit and demarcate the colonial treaty border based on pertinent colonial treaties (1900 1902 and 1908) and applicable international law.\\\&quot; The EEBC on 30 November 2007 remotely demarcated the border assigning the town of Badme to Eritrea despite Ethiopia&#39;s maintaining forces there from the time of the 1998-2000 war. Eritrea insisted that the UN terminate its peacekeeping mission on 31 July 2008. Eritrea has accepted the EEBC&#39;s \\\&quot;virtual demarcation\\\&quot; decision and repeatedly called on Ethiopia to remove its troops. Ethiopia has not accepted the demarcation decision and neither party has entered into meaningful dialogue to resolve the impasse. Eritrea is subject to several UN Security Council Resolutions (from 2009 2011 and 2012) imposing various military and economic sanctions in view of evidence that it has supported armed opposition groups in the region.&quot;],&quot;overview&quot;:[0,&quot;&#39;Eritrea is a northeast African country on the Red Sea coast. It shares borders with Ethiopia Sudan and Djibouti. The capital city Asmara is known for its Italian colonial buildings like St. Joseph&#39;&#39;s Cathedral as well as art deco structures. Italian Egyptian and Turkish architecture in Massawa reflect the port city&#39;&#39;s colorful history. Notable buildings here include St. Mariam Cathedral and the Imperial Palace.&#39;&quot;],&quot;independent&quot;:[0,1],&quot;landmass_km&quot;:[0,101000],&quot;population_christian&quot;:[0,2871000],&quot;population_christian_percentage&quot;:[0,50],&quot;population_catholic_percentage&quot;:[0,4],&quot;population_protestant_percentage&quot;:[0,45],&quot;population_refugee&quot;:[0,199],&quot;population_migration&quot;:[0,-39858],&quot;population_year_change&quot;:[0,1.41],&quot;population_density_km&quot;:[0,35],&quot;population_average_age&quot;:[0,19],&quot;population_urban_percentage&quot;:[0,63],&quot;population_literacy_percentage&quot;:[0,69],&quot;region_code&quot;:[0,7],&quot;region_id&quot;:[0,202],&quot;region_name&quot;:[0,&quot;Sub-Saharan Africa&quot;],&quot;url_wiki&quot;:[0,&quot;https://en.wikipedia.org/wiki/Eritrea&quot;],&quot;url_britannica&quot;:[0,&quot;https://www.britannica.com/place/Eritrea&quot;],&quot;url_ubs&quot;:[0,&quot;https://unitedbiblesocieties.org/locations/bible-society-of-eritrea/&quot;],&quot;url_factbook&quot;:[0,&quot;https://www.cia.gov/the-world-factbook/countries/eritrea/&quot;],&quot;url_factbook_pdf&quot;:[0,&quot;https://images.bible.cloud/maps/summary/ER-summary.pdf&quot;],&quot;url_human_development&quot;:[0,&quot;https://hdr.undp.org/data-center/specific-country-data#/countries/ERI&quot;],&quot;url_nations_online&quot;:[0,&quot;https://www.nationsonline.org/oneworld
