const setDarkMode = () => {
    const isDarkModePreferred = () => {
        return localStorage.theme === "dark" ||
               (!("theme" in localStorage) && window.matchMedia("(prefers-color-scheme: dark)").matches);
    };

    const toggleClasses = (element, condition, classesOn, classesOff) => {
        classesOn.forEach(cls => element.classList.toggle(cls, condition));
        classesOff.forEach(cls => element.classList.toggle(cls, !condition));
    };

    const toggleDarkMode = () => {
        const isDark = document.documentElement.classList.toggle("dark");
        updateTogglerUI(isDark);
        localStorage.theme = isDark ? "dark" : "light";
    };

    const preferredDarkMode = isDarkModePreferred();
    document.documentElement.classList.toggle("dark", preferredDarkMode);
    attachEvent("[data-aw-toggle-color-scheme]", "click", toggleDarkMode);
};



    document.addEventListener("DOMContentLoaded", setDarkMode);

  function attachEvent(selector, event, fn) {
    const matches = document.querySelectorAll(selector)
    if (matches && matches.length) {
      matches.forEach((elem) => {
        elem.addEventListener(
          event,
          function () {
            fn(elem)
          },
          false
        )
      })
    }
  }

uot;continent_id&quot;:[0,&quot;AS&quot;],&quot;iso_num&quot;:[0,795],&quot;language_count&quot;:[0,42],&quot;religion_primary&quot;:[0,&quot;Islam&quot;],&quot;introduction&quot;:[0,&quot;Present-day Turkmenistan covers territory that has been at the crossroads of civilizations for centuries. The area was ruled in antiquity by various Persian empires and was conquered by Alexander the Great Muslim crusaders the Mongols Turkic warriors and eventually the Russians. In medieval times Merv (today known as Mary) was one of the great cities of the Islamic world and an important stop on the Silk Road. Annexed by Russia in the late 1800s Turkmenistan later figured prominently in the anti-Bolshevik movement in Central Asia. In 1924 Turkmenistan became a Soviet republic; it achieved independence upon the dissolution of the USSR in 1991. Extensive hydrocarbon/natural gas reserves which have yet to be fully exploited have begun to transform the country. Turkmenistan is moving to expand its extraction and delivery projects. The Government of Turkmenistan is actively working to diversify its gas export routes beyond the still important Russian pipeline network. In 2010 new gas export pipelines that carry Turkmen gas to China and to northern Iran began operating effectively ending the Russian monopoly on Turkmen gas exports. President for Life Saparmurat NYYAZOW died in December 2006 and Turkmenistan held its first multi-candidate presidential election in February 2007. Gurbanguly BERDIMUHAMEDOW a deputy cabinet chairman under NYYAZOW emerged as the country&#39;s new president; he was chosen as president again in February 2012 in an election that the OSCE said lacked the freedoms necessary to create a competitive environment.&quot;],&quot;overview&quot;:[0,&quot;Turkmenistan is a country in Central Asia bordered by the Caspian Sea and largely covered by the Karakum Desert. It’s known for archaeological ruins including those at Nisa and Merv major stops along the ancient trade route the Silk Road. Ashgabat the capital was rebuilt in Soviet style in the mid-20th century and is filled with grand monuments honoring former president Saparmurat Niyazov.&quot;],&quot;independent&quot;:[0,1],&quot;landmass_km&quot;:[0,469930],&quot;population_christian&quot;:[0,466000],&quot;population_christian_percentage&quot;:[0,9],&quot;population_protestant_percentage&quot;:[0,9],&quot;population_refugee&quot;:[0,22],&quot;population_migration&quot;:[0,-5000],&quot;population_year_change&quot;:[0,1.5],&quot;population_density_km&quot;:[0,13],&quot;population_average_age&quot;:[0,27],&quot;population_urban_percentage&quot;:[0,53],&quot;population_literacy_percentage&quot;:[0,100],&quot;region_code&quot;:[0,5],&quot;region_id&quot;:[0,143],&quot;region_name&quot;:[0,&quot;Central Asia&quot;],&quot;url_wiki&quot;:[0,&quot;https://en.wikipedia.org/wiki/Turkmenistan&quot;],&quot;url_britannica&quot;:[0,&quot;https://www.britannica.com/place/Turkmenistan&quot;],&quot;url_factbook&quot;:[0,&quot;https://www.cia.gov/the-world-factbook/countries/turkmenistan/&quot;],&quot;url_factbook_pdf&quot;:[0,&quot;https://images.bible.cloud/maps/summary/TX-summary.pdf&quot;],&quot;url_human_development&quot;:[0,&quot;https://hdr.undp.org/data-center/specific-country-data#/countries/TKM&quot;],&quot;url_nations_online&quot;:[0,&quot;https://www.nationsonline.org/oneworld/turkmenistan.htm&quot;],&quot;url_odp&quot;:[0,&quot;https://curlie.org/Regional/Asia/Turkmenistan&quot;],&quot;url_operation_world&quot;:[0,&quot;https://operationworld.org/locations/turkmenistan&quot;],&quot;url_religious_freedom&quot;:[0,&quot;https://www.state.gov/countries-areas/turkmenistan/&quot;],&quot;url_joshua&quot;:[0,&quot;https://joshuaproject.net/countries/TM&quot;],&quot;url_prayercast&quot;:[0,&quot;https://prayercast.com/turkmenistan.html&quot;],&quot;url_prayercast_video&quot;:[0,&quot;https://player.vimeo.com/video/74853490&quot;],&quot;url_prayercast_download&quot;:[0,&quot;http://www.prayerca
