const setDarkMode = () => {
    const isDarkModePreferred = () => {
        return localStorage.theme === "dark" ||
               (!("theme" in localStorage) && window.matchMedia("(prefers-color-scheme: dark)").matches);
    };

    const toggleClasses = (element, condition, classesOn, classesOff) => {
        classesOn.forEach(cls => element.classList.toggle(cls, condition));
        classesOff.forEach(cls => element.classList.toggle(cls, !condition));
    };

    const toggleDarkMode = () => {
        const isDark = document.documentElement.classList.toggle("dark");
        updateTogglerUI(isDark);
        localStorage.theme = isDark ? "dark" : "light";
    };

    const preferredDarkMode = isDarkModePreferred();
    document.documentElement.classList.toggle("dark", preferredDarkMode);
    attachEvent("[data-aw-toggle-color-scheme]", "click", toggleDarkMode);
};



    document.addEventListener("DOMContentLoaded", setDarkMode);

  function attachEvent(selector, event, fn) {
    const matches = document.querySelectorAll(selector)
    if (matches && matches.length) {
      matches.forEach((elem) => {
        elem.addEventListener(
          event,
          function () {
            fn(elem)
          },
          false
        )
      })
    }
  }

M&quot;],&quot;continent_id&quot;:[0,&quot;AS&quot;],&quot;iso_num&quot;:[0,887],&quot;language_count&quot;:[0,28],&quot;religion_primary&quot;:[0,&quot;Islam&quot;],&quot;introduction&quot;:[0,&quot;North Yemen became independent of the Ottoman Empire in 1918. The British who had set up a protectorate area around the southern port of Aden in the 19th century withdrew in 1967 from what became South Yemen. Three years later the southern government adopted a Marxist orientation. The massive exodus of hundreds of thousands of Yemenis from the south to the north contributed to two decades of hostility between the states. The two countries were formally unified as the Republic of Yemen in 1990. A southern secessionist movement and brief civil war in 1994 was quickly subdued. In 2000 Saudi Arabia and Yemen agreed to a delimitation of their border. Fighting in the northwest between the government and the Huthis a Zaydi Shia minority began in 2004 and has since resulted in six rounds of fighting - the last ended in early 2010 with a cease-fire that continues to hold. The southern secessionist movement was revitalized in 2008 when a popular socioeconomic protest movement initiated the prior year took on political goals including secession. Public rallies in Sana&#39;a against then President SALIH - inspired by similar demonstrations in Tunisia and Egypt - slowly built momentum starting in late January 2011 fueled by complaints over high unemployment poor economic conditions and corruption. By the following month some protests had resulted in violence and the demonstrations had spread to other major cities. By March the opposition had hardened its demands and was unifying behind calls for SALIH&#39;s immediate ouster and prominent military and tribal leaders began defecting from SALIH&#39;s camp. The Gulf Cooperation Council (GCC) in late April 2011 in an attempt to mediate the crisis in Yemen proposed an agreement in which the president would step down in exchange for immunity from prosecution. SALIH&#39;s refusal to sign an agreement led to heavy street fighting and his injury in an explosion in June 2011. The UN Security Council passed Resolution 2014 in October 2011 calling on both sides to end the violence and complete a power transfer deal. In late November 2011 SALIH signed the GCC-brokered agreement to step down and to transfer some of his powers to Vice President Abd Rabuh Mansur HADI. Following elections in February 2012 won by HADI SALIH formally transferred his powers. In accordance with the GCC initiative Yemen launched a National Dialogue in March 2013 to discuss key constitutional political and social issues. HADI concluded the National Dialogue in January 2014. Subsequent steps in the transition process include constitutional drafting a constitutional referendum and national elections.&quot;],&quot;overview&quot;:[0,&quot;Yemen officially known as the Republic of Yemen is an Arab sovereign state in Western Asia at the southern end of the Arabian Peninsula. Yemen is the second-largest country in the peninsula occupying 527970 square kilometres.&quot;],&quot;independent&quot;:[0,1],&quot;landmass_km&quot;:[0,527970],&quot;population_christian&quot;:[0,41000],&quot;population_christian_percentage&quot;:[0,0.2],&quot;population_catholic_percentage&quot;:[0,0.02],&quot;population_refugee&quot;:[0,268511],&quot;population_migration&quot;:[0,-30000],&quot;population_year_change&quot;:[0,2.28],&quot;population_density_km&quot;:[0,56],&quot;population_average_age&quot;:[0,20],&quot;population_urban_percentage&quot;:[0,38],&quot;population_literacy_percentage&quot;:[0,70],&quot;region_code&quot;:[0,6],&quot;region_id&quot;:[0,145],&quot;region_name&quot;:[0,&quot;Western Asia&quot;],&quot;url_wiki&quot;:[0,&quot;https://en.wikipedia.org/wiki/Yemen&quot;],&quot;url_britannica&quot;:[0,&quot;https://www.britannica.com/place/Yemen&quot;],&quot;url_national_society&quot;:[0,&quot;http://www.bsgulf.org/&quot;],&quot;url_ubs&quot;:[0,&q
