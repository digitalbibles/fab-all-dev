const setDarkMode = () => {
    const isDarkModePreferred = () => {
        return localStorage.theme === "dark" ||
               (!("theme" in localStorage) && window.matchMedia("(prefers-color-scheme: dark)").matches);
    };

    const toggleClasses = (element, condition, classesOn, classesOff) => {
        classesOn.forEach(cls => element.classList.toggle(cls, condition));
        classesOff.forEach(cls => element.classList.toggle(cls, !condition));
    };

    const toggleDarkMode = () => {
        const isDark = document.documentElement.classList.toggle("dark");
        updateTogglerUI(isDark);
        localStorage.theme = isDark ? "dark" : "light";
    };

    const preferredDarkMode = isDarkModePreferred();
    document.documentElement.classList.toggle("dark", preferredDarkMode);
    attachEvent("[data-aw-toggle-color-scheme]", "click", toggleDarkMode);
};

  function attachEvent(selector, event, fn) {
    const matches = document.querySelectorAll(selector)
    if (matches && matches.length) {
      matches.forEach((elem) => {
        elem.addEventListener(
          event,
          function () {
            fn(elem)
          },
          false
        )
      })
    }
  }

tinent_id&quot;:[0,&quot;AS&quot;],&quot;iso_num&quot;:[0,268],&quot;language_count&quot;:[0,40],&quot;religion_primary&quot;:[0,&quot;Christianity&quot;],&quot;introduction&quot;:[0,&quot;The region of present day Georgia contained the ancient kingdoms of Colchis and Kartli-Iberia. The area came under Roman influence in the first centuries A.D. and Christianity became the state religion in the 330s. Domination by Persians Arabs and Turks was followed by a Georgian golden age (11th-13th centuries) that was cut short by the Mongol invasion of 1236. Subsequently the Ottoman and Persian empires competed for influence in the region. Georgia was absorbed into the Russian Empire in the 19th century. Independent for three years (1918-1921) following the Russian revolution it was forcibly incorporated into the USSR in 1921 and regained its independence when the Soviet Union dissolved in 1991. ++ Mounting public discontent over rampant corruption and ineffective government services followed by an attempt by the incumbent Georgian Government to manipulate parliamentary elections in November 2003 touched off widespread protests that led to the resignation of Eduard SHEVARDNADZE president since 1995. In the aftermath of that popular movement which became known as the \\\&quot;Rose Revolution\\\&quot; new elections in early 2004 swept Mikheil SAAKASHVILI into power along with his United National Movement (UNM) party. Progress on market reforms and democratization has been made in the years since independence but this progress has been complicated by Russian assistance and support to the separatist regions of Abkhazia and South Ossetia. Periodic flare-ups in tension and violence culminated in a five-day conflict in August 2008 between Russia and Georgia including the invasion of large portions of undisputed Georgian territory. Russian troops pledged to pull back from most occupied Georgian territory but in late August 2008 Russia unilaterally recognized the independence of Abkhazia and South Ossetia and Russian military forces remain in those regions. ++ Billionaire philanthropist Bidzina IVANISHVILI&#39;s unexpected entry into politics in October 2011 brought the divided opposition together under his Georgian Dream coalition which won a majority of seats in the October 2012 parliamentary elections and removed UNM from power. Conceding defeat SAAKASHVILI named IVANISHVILI as prime minister and allowed Georgian Dream to create a new government. Georgian Dream&#39;s Giorgi MARGVELASHVILI was inaugurated as president on 17 November 2013 ending a tense year of power-sharing between SAAKASHVILI and IVANISHVILI. IVANISHVILI voluntarily resigned from office after the presidential succession and Georgia&#39;s legislature on 20 November 2013 confirmed Irakli GARIBASHVILI as his replacement. GARIBASHVILI was replaced by Giorgi KVIRIKASHVILI in December 2015. KVIRIKASHVILI will remain Prime Minister following Georgian Dream’s success in the October 2016 parliamentary elections where the party won a constitutional majority. These changes in leadership represent unique examples of a former Soviet state that emerged to conduct democratic and peaceful government transitions of power. Popular and government support for integration with the West is high in Georgia. Joining the EU and NATO are among the country&#39;s top foreign policy goals.&quot;],&quot;overview&quot;:[0,&quot;Georgia is a southeastern U.S. state whose terrain spans coastal beaches farmland and mountains. Capital city Atlanta is home of the Georgia Aquarium and the Martin Luther King Jr. National Historic Site dedicated to the African-American leader’s life and times. The city of Savannah is famed for its 18th- and 19th-century architecture and leafy public squares. Augusta hosts the Masters golf tournament.&quot;],&quot;independent&quot;:[0,1],&quot;landmass_km&quot;:[0,69490],&quot;population_christian&quot;:[0,3930000],&quot;population_christian_percentage&quot;:[0,88.6],&quot;populatio
