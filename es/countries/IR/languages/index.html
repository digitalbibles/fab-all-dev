const setDarkMode = () => {
    const isDarkModePreferred = () => {
        return localStorage.theme === "dark" ||
               (!("theme" in localStorage) && window.matchMedia("(prefers-color-scheme: dark)").matches);
    };

    const toggleClasses = (element, condition, classesOn, classesOff) => {
        classesOn.forEach(cls => element.classList.toggle(cls, condition));
        classesOff.forEach(cls => element.classList.toggle(cls, !condition));
    };

    const toggleDarkMode = () => {
        const isDark = document.documentElement.classList.toggle("dark");
        updateTogglerUI(isDark);
        localStorage.theme = isDark ? "dark" : "light";
    };

    const preferredDarkMode = isDarkModePreferred();
    document.documentElement.classList.toggle("dark", preferredDarkMode);
    attachEvent("[data-aw-toggle-color-scheme]", "click", toggleDarkMode);
};



    document.addEventListener("DOMContentLoaded", setDarkMode);

  function attachEvent(selector, event, fn) {
    const matches = document.querySelectorAll(selector)
    if (matches && matches.length) {
      matches.forEach((elem) => {
        elem.addEventListener(
          event,
          function () {
            fn(elem)
          },
          false
        )
      })
    }
  }

quot;IRN&quot;],&quot;continent_id&quot;:[0,&quot;AS&quot;],&quot;iso_num&quot;:[0,364],&quot;language_count&quot;:[0,99],&quot;religion_primary&quot;:[0,&quot;Islam&quot;],&quot;introduction&quot;:[0,&quot;Known as Persia until 1935 Iran became an Islamic republic in 1979 after the ruling monarchy was overthrown and Shah Mohammad Reza PAHLAVI was forced into exile. Conservative clerical forces led by Ayatollah Ruhollah KHOMEINI established a theocratic system of government with ultimate political authority vested in a learned religious scholar referred to commonly as the Supreme Leader who according to the constitution is accountable only to the Assembly of Experts - a popularly elected 86-member body of clerics. US-Iranian relations became strained when a group of Iranian students seized the US Embassy in Tehran in November 1979 and held embassy personnel hostages until mid-January 1981. The US cut off diplomatic relations with Iran in April 1980. During the period 1980-88 Iran fought a bloody indecisive war with Iraq that eventually expanded into the Persian Gulf and led to clashes between US Navy and Iranian military forces. Iran has been designated a state sponsor of terrorism for its activities in Lebanon and elsewhere in the world and remains subject to US UN and EU economic sanctions and export controls because of its continued involvement in terrorism and concerns over possible military dimensions of its nuclear program. Following the election of reformer Hojjat ol-Eslam Mohammad KHATAMI as president in 1997 and a reformist Majles (legislature) in 2000 a campaign to foster political reform in response to popular dissatisfaction was initiated. The movement floundered as conservative politicians supported by the Supreme Leader unelected institutions of authority like the Council of Guardians and the security services reversed and blocked reform measures while increasing security repression. ++ Starting with nationwide municipal elections in 2003 and continuing through Majles elections in 2004 conservatives reestablished control over Iran&#39;s elected government institutions which culminated with the August 2005 inauguration of hardliner Mahmud AHMADI-NEJAD as president. His controversial reelection in June 2009 sparked nationwide protests over allegations of electoral fraud. These protests were quickly suppressed and the political opposition that arose as a consequence of AHMADI-NEJAD&#39;s election was repressed. Deteriorating economic conditions due primarily to government mismanagement and international sanctions prompted at least two major economically based protests in July and October 2012 but Iran&#39;s internal security situation remained stable. President AHMADI-NEJAD&#39;s independent streak angered regime establishment figures including the Supreme Leader leading to conservative opposition to his agenda for the last year of his presidency and an alienation of his political supporters. In June 2013 Iranians elected a moderate conservative cleric Dr. Hasan Fereidun RUHANI to the presidency. He is a longtime senior member in the regime but has made promises of reforming society and Iran&#39;s foreign policy. The UN Security Council has passed a number of resolutions calling for Iran to suspend its uranium enrichment and reprocessing activities and comply with its IAEA obligations and responsibilities and in July 2015 Iran and the five permanent members plus Germany (P5+1) signed the Joint Comprehensive Plan of Action (JCPOA) under which Iran agreed to restrictions on its nuclear program in exchange for sanctions relief. Iran held elections in 2016 for the Assembly of Experts (AOE) and Majles resulting in a conservative-controlled AOE and a Majles that many Iranians perceive as more supportive of the RUHANI administration than the previous conservative-dominated body.&quot;],&quot;overview&quot;:[0,&quot;Iran is an Islamic republic on the Persian (Arabian) Gulf with historical sites dating to the Persian Empire.
