const setDarkMode = () => {
    const isDarkModePreferred = () => {
        return localStorage.theme === "dark" ||
               (!("theme" in localStorage) && window.matchMedia("(prefers-color-scheme: dark)").matches);
    };

    const toggleClasses = (element, condition, classesOn, classesOff) => {
        classesOn.forEach(cls => element.classList.toggle(cls, condition));
        classesOff.forEach(cls => element.classList.toggle(cls, !condition));
    };

    const toggleDarkMode = () => {
        const isDark = document.documentElement.classList.toggle("dark");
        updateTogglerUI(isDark);
        localStorage.theme = isDark ? "dark" : "light";
    };

    const preferredDarkMode = isDarkModePreferred();
    document.documentElement.classList.toggle("dark", preferredDarkMode);
    attachEvent("[data-aw-toggle-color-scheme]", "click", toggleDarkMode);
};



    document.addEventListener("DOMContentLoaded", setDarkMode);

  function attachEvent(selector, event, fn) {
    const matches = document.querySelectorAll(selector)
    if (matches && matches.length) {
      matches.forEach((elem) => {
        elem.addEventListener(
          event,
          function () {
            fn(elem)
          },
          false
        )
      })
    }
  }

inent_id&quot;:[0,&quot;EU&quot;],&quot;iso_num&quot;:[0,372],&quot;language_count&quot;:[0,35],&quot;religion_primary&quot;:[0,&quot;Christianity&quot;],&quot;introduction&quot;:[0,&quot;Celtic tribes arrived on the island between 600 and 150 B.C. Invasions by Norsemen that began in the late 8th century were finally ended when King Brian BORU defeated the Danes in 1014. Norman invasions began in the 12th century and set off more than seven centuries of Anglo-Irish struggle marked by fierce rebellions and harsh repressions. The Irish famine of the mid-19th century saw the population of the island drop by one third through starvation and emigration. For more than a century after that the population of the island continued to fall only to begin growing again in the 1960s. Over the last 50 years Ireland&#39;s high birthrate has made it demographically one of the youngest populations in the EU. The modern Irish state traces its origins to the failed 1916 Easter Monday Uprising which touched off several years of guerrilla warfare resulting in independence from the UK in 1921 for 26 southern counties; six northern counties remained part of the UK. Unresolved issues in Northern Ireland erupted into years of violence known as the \\\&quot;Troubles\\\&quot; that began in the 1960s. The Government of Ireland was part of a process along with the UK and US Governments that helped broker what is known as The Good Friday Agreement in Northern Ireland in 1998. This initiated a new phase of cooperation between Irish and British governments. Ireland was neutral in World War II and continues its policy of military neutrality. Ireland joined the European Community in 1973 and the Eurozone currency union in 1999. The economic boom years of the Celtic Tiger (1995-2007) saw rapid economic growth which came to an abrupt end in 2008 with the meltdown of the Irish banking system. Today the economy is recovering fueled by large and growing foreign direct investment especially from US multi-nationals.&quot;],&quot;overview&quot;:[0,&quot;&#39;Ireland is an island in the North Atlantic. It is separated from Great Britain to its east by the North Channel the Irish Sea and St George&#39;&#39;s Channel. Ireland is the third-largest island in Europe&#39;&quot;],&quot;independent&quot;:[0,1],&quot;landmass_km&quot;:[0,68890],&quot;population_christian&quot;:[0,3992000],&quot;population_christian_percentage&quot;:[0,83.8],&quot;population_catholic_percentage&quot;:[0,78.2],&quot;population_protestant_percentage&quot;:[0,5.6],&quot;population_refugee&quot;:[0,7800],&quot;population_migration&quot;:[0,23604],&quot;population_year_change&quot;:[0,1.13],&quot;population_density_km&quot;:[0,72],&quot;population_average_age&quot;:[0,38],&quot;population_urban_percentage&quot;:[0,63],&quot;population_literacy_percentage&quot;:[0,99],&quot;region_code&quot;:[0,10],&quot;region_id&quot;:[0,154],&quot;region_name&quot;:[0,&quot;Northern Europe&quot;],&quot;url_wiki&quot;:[0,&quot;https://en.wikipedia.org/wiki/Republic_of_Ireland&quot;],&quot;url_britannica&quot;:[0,&quot;https://www.britannica.com/place/Ireland&quot;],&quot;url_national_society&quot;:[0,&quot;https://biblesocietyni.co.uk/&quot;],&quot;url_ubs&quot;:[0,&quot;https://unitedbiblesocieties.org/locations/bible-society-in-northern-ireland/&quot;],&quot;url_factbook&quot;:[0,&quot;https://www.cia.gov/the-world-factbook/countries/ireland/&quot;],&quot;url_factbook_pdf&quot;:[0,&quot;https://images.bible.cloud/maps/summary/EI-summary.pdf&quot;],&quot;url_human_development&quot;:[0,&quot;https://hdr.undp.org/data-center/specific-country-data#/countries/IRL&quot;],&quot;url_nations_online&quot;:[0,&quot;https://www.nationsonline.org/oneworld/ireland.htm&quot;],&quot;url_odp&quot;:[0,&quot;https://curlie.org/Regional/Europe/Ireland&quot;],&quot;url_operation_world&quot;:[0,&quot;https://operationworld.org/locations/ireland&quot;],&quot;url_religious_freedom&quot;:[0,&quot;https://www.state.gov/countries-areas/irela
