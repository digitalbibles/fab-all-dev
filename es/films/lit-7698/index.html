const setDarkMode = () => {
    const isDarkModePreferred = () => {
        return localStorage.theme === "dark" ||
               (!("theme" in localStorage) && window.matchMedia("(prefers-color-scheme: dark)").matches);
    };

    const toggleClasses = (element, condition, classesOn, classesOff) => {
        classesOn.forEach(cls => element.classList.toggle(cls, condition));
        classesOff.forEach(cls => element.classList.toggle(cls, !condition));
    };

    const toggleDarkMode = () => {
        const isDark = document.documentElement.classList.toggle("dark");
        updateTogglerUI(isDark);
        localStorage.theme = isDark ? "dark" : "light";
    };

    const preferredDarkMode = isDarkModePreferred();
    document.documentElement.classList.toggle("dark", preferredDarkMode);
    attachEvent("[data-aw-toggle-color-scheme]", "click", toggleDarkMode);
};

  function attachEvent(selector, event, fn) {
    const matches = document.querySelectorAll(selector)
    if (matches && matches.length) {
      matches.forEach((elem) => {
        elem.addEventListener(
          event,
          function () {
            fn(elem)
          },
          false
        )
      })
    }
  }

	to-secondary-500 dark:from-primary-800 dark:via-primary-900 dark:to-secondary-800"></div>  </div> <astro-island uid="1qhByy" component-url="/_astro/FilmGalleries.oke3Ae9a.js" component-export="default" renderer-url="/_astro/client.CWY0IrnN.js" props="{&quot;bibleProjectFilms&quot;:[1,[[0,{&quot;slug&quot;:[0,&quot;ivadas-i-dvasines-butybes&quot;],&quot;title_vernacular&quot;:[0,&quot;Įvadas į dvasines būtybes&quot;],&quot;title&quot;:[0,&quot;Introduction to Spiritual Beings&quot;],&quot;subtitle&quot;:[0,&quot;&quot;],&quot;book&quot;:[0,&quot;&quot;],&quot;start_c&quot;:[0,&quot;&quot;],&quot;end_chapter&quot;:[0,&quot;&quot;],&quot;description&quot;:[0,&quot;Pirmuose Biblijos puslapiuose mums pristatomi pagrindiniai jos veikėjai: Dievas ir žmonės. Tačiau Biblijoje be jų svarbų vaidmenį turi ir daugybė kitų dvasinių būtybių, nors jos dažniausiai ir lieka veiksmo fone. Šiame įraše šias būtybes ir pradėsime tyrinėti, siekdami suprasti, kaip jos įsilieja į vientisą Biblijos pasakojimą.\\n\\n&quot;],&quot;language&quot;:[0,&quot;Lithuanian / Lietuvių k.&quot;],&quot;iso&quot;:[0,&quot;lit&quot;],&quot;filesystem&quot;:[0,&quot;LITTBP_ivadas_i_dvasines_butybes&quot;],&quot;image&quot;:[0,&quot;TBPEXP_TSB_IntrotoSpiritualBeings&quot;],&quot;youtube&quot;:[0,&quot;CqDqyIyyZow&quot;]}],[0,{&quot;slug&quot;:[0,&quot;elohim&quot;],&quot;title_vernacular&quot;:[0,&quot;Elohim&quot;],&quot;title&quot;:[0,&quot;Elohim&quot;],&quot;subtitle&quot;:[0,&quot;&quot;],&quot;book&quot;:[0,&quot;&quot;],&quot;start_c&quot;:[0,&quot;&quot;],&quot;end_chapter&quot;:[0,&quot;&quot;],&quot;description&quot;:[0,&quot;Ar žinojote, kad biblinis žodis Dievui nusakyti yra titulas, o ne vardas? Taip pat, ar žinojote, kad šis titulas gali nurodyti ne tik į Dievą, bet ir į kitas dvasines būtybes? Šiame įraše aptarsime dvasinėms būtybėms apibūdinti skirtą biblinę terminologiją ir pasiaiškinsime, kaip tai mums padeda suprasti, kas turima omenyje, kai Biblijoje rašoma, jog „Dievas yra vienas“.\\n\\n&quot;],&quot;language&quot;:[0,&quot;Lithuanian / Lietuvių k.&quot;],&quot;iso&quot;:[0,&quot;lit&quot;],&quot;filesystem&quot;:[0,&quot;LITTBP_elohim&quot;],&quot;image&quot;:[0,&quot;TBPEXP_TSB_Elohim&quot;],&quot;youtube&quot;:[0,&quot;2QHZ-tNj6Qc&quot;]}],[0,{&quot;slug&quot;:[0,&quot;dieviskoji-taryba&quot;],&quot;title_vernacular&quot;:[0,&quot;Dieviškoji taryba&quot;],&quot;title&quot;:[0,&quot;Divine council&quot;],&quot;subtitle&quot;:[0,&quot;&quot;],&quot;book&quot;:[0,&quot;&quot;],&quot;start_c&quot;:[0,&quot;&quot;],&quot;end_chapter&quot;:[0,&quot;&quot;],&quot;description&quot;:[0,&quot;Kas per dalykas ta dieviškoji taryba? Na, visų pirma, tai ne kažkoks žemiškas dalykas. Šis biblinis žodžių junginys nurodo į sampratą Dievo sukurtų dvasinių jėgų, kurioms buvo skirta kartu su žmonėmis būti bendravaldžiais. Nepaisant to, visi sumaištauja ir sukelia didžiulių problemų, kurias išspęsti gali vienintelis Jėzus. Į visą tai ir dar daugiau gilinamės trečiojoje „Dvasinių būtybių“ serijos dalyje.\\n\\n&quot;],&quot;language&quot;:[0,&quot;Lithuanian / Lietuvių k.&quot;],&quot;iso&quot;:[0,&quot;lit&quot;],&quot;filesystem&quot;:[0,&quot;LITTBP_dieviskoji_taryba&quot;],&quot;image&quot;:[0,&quot;TBPEXP_TSB_DivineCouncil&quot;],&quot;youtube&quot;:[0,&quot;3KKAvfmKdgg&quot;]}],[0,{&quot;slug&quot;:[0,&quot;angelai-ir-cherubinai&quot;],&quot;title_vernacular&quot;:[0,&quot;Angelai ir cherubinai&quot;],&quot;title&quot;:[0,&quot;Angels and Cherubim&quot;],&quot;subtitle&quot;:[0,&quot;&quot;],&quot;book&quot;:[0,&quot;&quot;],&quot;start_c&quot;:[0,&quot;&quot;],&quot;end_chapter&quot;:[0,&quot;&quot;],&quot;description&quot;:[0,&quot;Ar žinojote, kad angelai Biblijoje neturi sparnų? Arba tai, kad cherubinai nėra mieli ir putlūs kūdikiai? Šiame vaizdo įraše nagrinėjame šių dvasinių būtybių aprašymus, siekdami suprasti, kas tiksliai jie yra ir koks jų vaidmuo Biblijos pasakojime.\\n\\n&quot;],&quot;language&quot;:[0,&quot;Lithuanian / Lietuvių k.&quot;],&quot;iso&quot;:[0,&quot;lit&quot;],&quot;filesystem&quot;:[0,&quot;LITTBP_angelai_ir_cherubinai&quot;],&quot;image&quot;:[0,&quot;TBPEXP_TSB_AngelsandCherubim&quot;],&quot;youtube&quot;:[0,&quot;7iI6T2QcWXk&quot;]}],[0,{&quot;slug&quot;:[0,&quot;kas-yra-biblija&quot;],&quot;title_vernacular&quot;:[0,&quot;Kas yra Biblija?&quot;],&quot;title&quot;:[0,&quot;What is the Bible?&quot;],&quot;subtitle&quot;:[0,&quot;&quot;],&quot;book&quot;:[0,&quot;&quot;],&quot;start_c&quot;:[0,&quot;&quot;],&quot;end_chapter&quot;:[0,&quot;&quot;],&quot;description&quot;:[0,&quot;Šis filmukas yra pirmoji tęstinės serijos, nagrinėjančios Biblijos kilmę, turinį ir tikslą, dalis. Joje būsite supažindinti su trumpa Biblijos atsiradimo istorija. Taip pat sužinosite apie skirtingas Biblijos sandaras katalikų, ortodoksų ir protestantų tradicijose.\\n\\n&quot;],&quot;language&quot;:[0,&quot;Lithuanian / Lietuvių k.&quot;],&quot;iso&quot;:[0,&quot;lit&quot;],&quot;filesystem&quot;:[0,&quot;LITTBP_kas_yra_biblija&quot;],&quot;image&quot;:[0,&quot;TBPHTR_INT_WhatIsTheBible&quot;],&quot;youtube&quot;:[0,&quot;Jk3Y__3L820&quot;]}],[0,{&quot;slug&quot;:[0,&quot;biblijos-pasakojimas&quot;],&quot;title_vernacular&quot;:[0,&quot;Biblijos pasakojimas&quot;],&quot;title&quot;:[0,&quot;Biblical narrative&quot;],&quot;subtitle&quot;:[0,&quot;&quot;],&quot;book&quot;:[0,&quot;&quot;],&quot;start_c&quot;:[0,&quot;&quot;],&quot;end_chapter&quot;:[0,&quot;&quot;],&quot;description&quot;:[0,&quot;Šis įrašas apibendrina visą Biblijos pasakojimą kaip virtinę sprendimų, priimamų nuolat atsiduriant tarsi kryžkelėje. Visa žmonija, kaip po to ir izraeliečiai, suteikia naujas reikšmes gėriui ir blogiui bei atsiduria Babilone. Kiek vėliau pasirodo Jėzus, kuris renkasi kitokį kelią ir nutiesia taką į naują kūriniją.\\n\\n&quot;],&quot;language&quot;:[0,&quot;Lithuanian / Lietuvių k.&quot;],&quot;iso&quot;:[0,&quot;lit&quot;],&quot;filesystem&quot;:[0,&quot;LITTBP_biblijos_pasakojimas&quot;],&quot;image&quot;:[0,&quot;TBPHTR_INT_BiblicalStory&quot;],&quot;youtube&quot;:[0,&quot;zUTZ5imelvs&quot;]}],[0,{&quot;slug&quot;:[0,&quot;literaturos-zanrai-biblijoje&quot;],&quot;title_vernacular&quot;:[0,&quot;Literatūros žanrai Biblijoje&quot;],&quot;title&quot;:[0,&quot;Literary genres in the Bible&quot;],&quot;subtitle&quot;:[0,&quot;&quot;],&quot;book&quot;:[0,&quot;&quot;],&quot;start_c&quot;:[0,&quot;&quot;],&quot;end_chapter&quot;:[0,&quot;&quot;],&quot;description&quot;:[0,&quot;Trečioji serijos dalis atskleidžia, kad, norint Bibliją skaityti išmintingai, reikalinga suprasti jos autorių pasirinktus senovės literatūros žanrus. Jie savo mintis ir teiginius išreiškė per įvairių rūšių literatūrą. Šiame įraše patyrinėsime, kodėl svarbu gebėti tuos žanrus atskirti, kad jais perteikiamą žinią išgirstume kaip pridera.\\n\\n&quot;],&quot;language&quot;:[0,&quot;Lithuanian / Lietuvių k.&quot;],&quot;iso&quot;:[0,&quot;lit&quot;],&quot;filesystem&quot;:[0,&quot;LITTBP_literaturos_zanrai_biblijoje&quot;],&quot;image&quot;:[0,&quot;TBPHTR_INT_LiteraryStyles&quot;],&quot;youtube&quot;:[0,&quot;35PQ7qOZlTM&quot;]}],[0,{&quot;slug&quot;:[0,&quot;biblija-kaip-zydu-meditacine-literatura&quot;],&quot;title_vernacular&quot;:[0,&quot;Biblija kaip žydų meditacinė literatūra&quot;],&quot;title&quot;:[0,&quot;The Bible as Jewish meditative literature&quot;],&quot;subtitle&quot;:[0,&quot;&quot;],&quot;book&quot;:[0,&quot;&quot;],&quot;start_c&quot;:[0,&quot;&quot;],&quot;end_chapter&quot;:[0,&quot;&quot;],&quot;description&quot;:[0,&quot;Ketvirtojoje serijos dalyje nagrinėjamas išskirtinis Biblijos žanras, kuriuo siekiama skaitytojus įtraukti į visą gyvenimą trunkančią skaitymo ir apmastymų kelionę. Biblija sutvarkyta kaip daugiasluoksnis darbas, atskleidžiantis naujų įžvalgos lygmenų, skaitant jį vis iš naujo ir leidžiant kiekvienai daliai padėti mums suprasti visas kitas dalis. Biblija yra tikroji meditacinė literatūra.\\n\\n&quot;],&quot;language&quot;:[0,&quot;Lithuanian / Lietuvių k.&quot;],&quot;iso&quot;:[0,&quot;lit&quot;],&quot;filesystem&quot;:[0,&quot;LITTBP_biblija_kaip_zydu_meditacine_literatura&quot;],&quot;image&quot;:[0,&quot;TBPHTR_INT_Meditation&quot;],&quot;youtube&quot;:[0,&quot;6FdkS_qB6GE&quot;]}],[0,{&quot;slug&quot;:[0,&quot;siuzetas-bibliniame-pasakojime&quot;],&quot;title_vernacular&quot;:[0,&quot;Siužetas bibliniame pasakojime&quot;],&quot;title&quot;:[0,&quot;The plot in the biblical story&quot;],&quot;subtitle&quot;:[0,&quot;&quot;],&quot;book&quot;:[0,&quot;&quot;],&quot;start_c&quot;:[0,&quot;&quot;],&quot;end_chapter&quot;:[0,&quot;&quot;],&quot;description&quot;:[0,&quot;Norint išmokti gerai skaityti biblinius naratyvus, svarbu įsisąmoninti siužeto, t. y. kaip pasakojimai yra sudėlioti į tam tikrą konflikto ir atomazgos seką, reikšmę. Šiame filmuke išsiaiškinsime, kad nekreipdami dėmesio į siužeto eigą, biblinius pasakojimus galime suinterpretuoti iškreiptai. Taip pat pamatysime, kad naratyvo daugiasluoksniškumo supratimas padeda pamatyti tą vientisą pasakojimą, vedantį link Jėzaus. \\n\\n&quot;],&quot;language&quot;:[0,&quot;Lithuanian / Lietuvių k.&quot;],&quot;iso&quot;:[0,&quot;lit&quot;],&quot;filesystem&quot;:[0,&quot;LITTBP_siuzetas_bibliniame_pasakojime&quot;],&quot;image&quot;:[0,&quot;TBPHTR_NAR_Plot&quot;],&quot;youtube&quot;:[0,&quot;KNdA9nMXkBw&quot;]}],[0,{&quot;slug&quot;:[0,&quot;patarliu-knyga&quot;],&quot;title_vernacular&quot;:[0,&quot;Patarlių knyga&quot;],&quot;title&quot;:[0,&quot;The book of proverbs&quot;],&quot;subtitle&quot;:[0,&quot;&quot;],&quot;book&quot;:[0,&quot;&quot;],&quot;start_c&quot;:[0,&quot;&quot;],&quot;end_chapter&quot;:[0,&quot;&quot;],&quot;description&quot;:[0,&quot;Šioje knygoje pateikiama per ilgą laiką įžvalgių ir dievotų žmonių sukaupta išmintis. Joje skatinama gyventi dorai ir „Viešpaties baimėje“, kad galėtumėte giliai patirti, ką reiškia tikrai geras gyvenimas. Patarlių knyga yra viena iš trijų, nagrinėjančių šias biblinės išminties temas.\\n\\n&quot;],&quot;language&quot;:[0,&quot;Lithuanian / Lietuvių k.&quot;],&quot;iso&quot;:[0,&quot;lit&quot;],&quot;filesystem&quot;:[0,&quot;LITTBP_patarliu_knyga&quot;],&quot;image&quot;:[0,&quot;TBPBC_WIS_Proverbs&quot;],&quot;youtube&quot;:[0,&quot;3wsEghh3GlM&quot;]}],[0,{&quot;slug&quot;:[0,&quot;mokytojo-knyga&quot;],&quot;title_vernacular&quot;:[0,&quot;Mokytojo knyga&quot;],&quot;title&quot;:[0,&quot;Teacher&#39;s book&quot;],&quot;subtitle&quot;:[0,&quot;&quot;],&quot;book&quot;:[0,&quot;&quot;],&quot;start_c&quot;:[0,&quot;&quot;],&quot;end_chapter&quot;:[0,&quot;&quot;],&quot;description&quot;:[0,&quot;Šioje knygoje girdime skeptišką „Mokytojo“ balsą. Jis pastebi, kad gyvenimas remiantis Patarlių knygos išmintimi dar negarantuoja teigiamų rezultatų. Kartais gyvenimas yra sunkus ir jo realybė paneigia paprastus, tvarkingus atsakymus. Kaip šioje įtampoje gyventi ir vis tik siekti išminties? Mokytojo (Ekleziasto arba Koheleto) knyga yra antroji biblinės išminties knygų serijoje.\\n\\n&quot;],&quot;language&quot;:[0,&quot;Lithuanian / Lietuvių k.&quot;],&quot;iso&quot;:[0,&quot;lit&quot;],&quot;filesystem&quot;:[0,&quot;LITTBP_mokytojo_knyga&quot;],&quot;image&quot;:[0,&quot;TBPBC_WIS_Ecclesiastes&quot;],&quot;youtube&quot;:[0,&quot;kYo-B0RUUpw&quot;]}],[0,{&quot;slug&quot;:[0,&quot;jobo-knyga&quot;],&quot;title_vernacular&quot;:[0,&quot;Jobo knyga&quot;],&quot;title&quot;:[0,&quot;The book of Job&quot;],&quot;subtitle&quot;:[0,&quot;&quot;],&quot;book&quot;:[0,&quot;&quot;],&quot;start_c&quot;:[0,&quot;&quot;],&quot;end_chapter&quot;:[0,&quot;&quot;],&quot;description&quot;:[0,&quot;Kaip pasitikėti Dievu net tada, kai gyvenimas nėra teisingas ir tenka kentėti be jokios geros priežasties? Jobo istorija kviečia mus apmąstyti, ką reiškia tai, kad Dievas valdo pasaulį išmintimi ir kaip ši tiesa gali suteikti ramybę sunkiu metu. Jobo knyga yra paskutinioji iš trijų, nagrinėjančių šias biblinės išminties temas.\\n\\n&quot;],&quot;language&quot;:[0,&quot;Lithuanian / Lietuvių k.&quot;],&quot;iso&quot;:[0,&quot;lit&quot;],&quot;filesystem&quot;:[0,&quot;LITTBP_jobo_knyga&quot;],&quot;image&quot;:[0,&quot;TBPBC_WIS_Job&quot;],&quot;youtube&quot;:[0,&quot;Fm0z19ZenBg&quot;]}],[0,{&quot;slug&quot;:[0,&quot;shalom-taika-ramybe&quot;],&quot;title_vernacular&quot;:[0,&quot;Shalom – Taika / Ramybė&quot;],&quot;title&quot;:[0,&quot;Shalom - Peace / Tranquility&quot;],&quot;subtitle&quot;:[0,&quot;&quot;],&quot;book&quot;:[0,&quot;&quot;],&quot;start_c&quot;:[0,&quot;&quot;],&quot;end_chapter&quot;:[0,&quot;&quot;],&quot;description&quot;:[0,&quot;Sąvokos „taika“ ir „ramybė“ kitose kalbose neretai nusakomos vienu žodžiu. Taika ir ramybė – labai dažnai minimos Biblijoje. Svarbu suvokti, kad jos reiškia ne tik būvį be karo ar priešiškumo, bet kai ką daugiau. Šiame filmuke kaip tik ir panagrinėsime hebrajiško žodžio „shalom“ ir graikiško žodžio „eirene“ prasmę bei tai, kaip taika ir ramybė veda prie Jėzaus.\\n\\n&quot;],&quot;language&quot;:[0,&quot;Lithuanian / Lietuvių k.&quot;],&quot;iso&quot;:[0,&quot;lit&quot;],&quot;filesystem&quot;:[0,&quot;LITTBP_shalom_taika_ramybe&quot;],&quot;image&quot;:[0,&quot;TBPWS_ADV_Peace&quot;],&quot;youtube&quot;:[0,&quot;am8x3xNVt4I&quot;]}],[0,{&quot;slug&quot;:[0,&quot;shema-klausyk&quot;],&quot;title_vernacular&quot;:[0,&quot;Shema – Klausyk&quot;],&quot;title&quot;:[0,&quot;Shema - Listen&quot;],&quot;subtitle&quot;:[0,&quot;&quot;],&quot;book&quot;:[0,&quot;&quot;],&quot;start_c&quot;:[0,&quot;&quot;],&quot;end_chapter&quot;:[0,&quot;&quot;],&quot;description&quot;:[0,&quot;Ar girdėti ir klausyti(s) reiškia tą patį? Žiūrėdami šį filmuką išsiaiškinsite, kad klausyti(s) anaiptol ne tas pats, kas leisti garso bangoms suvirpinti ausų būgnelius. Bent jau kalbant iš biblinės perspektyvos... Šis vaizdo įrašas priklauso „Žodžių nagrinėjimo“ serijai. Šešiuose jos filmukuose tyrinėjame „Shema“ – garsią senovinę Biblijos maldą.\\n\\n&quot;],&quot;language&quot;:[0,&quot;Lithuanian / Lietuvių k.&quot;],&quot;iso&quot;:[0,&quot;lit&quot;],&quot;filesystem&quot;:[0,&quot;LITTBP_shema_klausyk&quot;],&quot;image&quot;:[0,&quot;TBPWS_TSS_ShemaListen&quot;],&quot;youtube&quot;:[0,&quot;N-1eamGzVo0&quot;]}],[0,{&quot;slug&quot;:[0,&quot;yhwh-viespats&quot;],&quot;title_vernacular&quot;:[0,&quot;YHWH – VIEŠPATS&quot;],&quot;title&quot;:[0,&quot;YHWH is LORD&quot;],&quot;subtitle&quot;:[0,&quot;&quot;],&quot;book&quot;:[0,&quot;&quot;],&quot;start_c&quot;:[0,&quot;&quot;],&quot;end_chapter&quot;:[0,&quot;&quot;],&quot;description&quot;:[0,&quot;Jahvė (Yahweh), Adonai, VIEŠPATS, Jehova (Jehovah)... Atrodo, kad Dievas turi daug vardų. Kaip derėtų Jį vadinti? Kviečiame į nuotykingą kelionę! Joje tyrinėsime skirtingus vardus, kuriais žydai ir krikščionys kreipdavosi į savo Kūrėją, ir bandysime suprasti, kodėl Dievą vadindavo būtent jais. Pažiūrėkite antrąjį filmuką mūsų šešių dalių serijoje apie senovinę biblinę maldą „Shema\\\&quot;.\\n\\n&quot;],&quot;language&quot;:[0,&quot;Lithuanian / Lietuvių k.&quot;],&quot;iso&quot;:[0,&quot;lit&quot;],&quot;filesystem&quot;:[0,&quot;LITTBP_yhwh_viespats&quot;],&quot;image&quot;:[0,&quot;TBPWS_TSS_YHWHLORD&quot;],&quot;youtube&quot;:[0,&quot;ORSXTdbftEQ&quot;]}],[0,{&quot;slug&quot;:[0,&quot;ahavah-meile&quot;],&quot;title_vernacular&quot;:[0,&quot;Ahavah – Meilė&quot;],&quot;title&quot;:[0,&quot;Ahavah - Love&quot;],&quot;subtitle&quot;:[0,&quot;&quot;],&quot;book&quot;:[0,&quot;&quot;],&quot;start_c&quot;:[0,&quot;&quot;],&quot;end_chapter&quot;:[0,&quot;&quot;],&quot;description&quot;:[0,&quot;Pakalbėkime apie meilę Senajame Testamente! Šiame vaizdo įraše nagrinėsime, kaip įvairiai hebrajų autoriai vartojo žodį „meilė“ ir kaip jie vaizdavo Dievą – visos žmogiškosios meilės galutinį šaltinį ir tikslą. Tai trečiasis „Žodžių nagrinėjimo\\\&quot; serijos filmukas, vienas iš šešių, kuriuose gvildenama senovinė Biblijos malda „Shema\\\&quot;. Aptarsime visus esminius šios maldos žodžius ir jų reikšmes originalo kalba ir istoriniame kontekste. \\n\\n&quot;],&quot;language&quot;:[0,&quot;Lithuanian / Lietuvių k.&quot;],&quot;iso&quot;:[0,&quot;lit&quot;],&quot;filesystem&quot;:[0,&quot;LITTBP_ahavah_meile&quot;],&quot;image&quot;:[0,&quot;TBPWS_TSS_AhavahLove&quot;],&quot;youtube&quot;:[0,&quot;8-IFdnfy03Q&quot;]}],[0,{&quot;slug&quot;:[0,&quot;lev-sirdis&quot;],&quot;title_vernacular&quot;:[0,&quot;Lev – Širdis&quot;],&quot;title&quot;:[0,&quot;Leo - Heart&quot;],&quot;subtitle&quot;:[0,&quot;&quot;],&quot;book&quot;:[0,&quot;&quot;],&quot;start_c&quot;:[0,&quot;&quot;],&quot;end_chapter&quot;:[0,&quot;&quot;],&quot;description&quot;:[0,&quot;Įvairiais laikotarpiais ir įvairiose kultūrose vis kitaip suprantama, kas yra ir kokias funkcijas atlieka žmogaus širdis. Šiame „Žodžių nagrinėjimo“ serijos įraše gvildensime, ką reiškia senovės hebrajų kalbos žodis „lev“, verčiamas kaip „širdis“. Biblijoje nėra žodžio, geriau atspindinčio žmogaus minčių, jausmų ir troškimų esmę nei šis turtingas ir įstabus žodis. Šis filmukas yra ketvirtasis iš šešių, nagrinėjančių senovinę Bibljos maldą „Shema“ – esminių jos žodžių reikšmę originalo kalba ir istorinį kontekstą.\\n\\n&quot;],&quot;language&quot;:[0,&quot;Lithuanian / Lietuvių k.&quot;],&quot;iso&quot;:[0,&quot;lit&quot;],&quot;filesystem&quot;:[0,&quot;LITTBP_lev_sirdis&quot;],&quot;image&quot;:[0,&quot;TBPWS_TSS_LevHeart&quot;],&quot;youtube&quot;:[0,&quot;3drKx4VbkD0&quot;]}],[0,{&quot;slug&quot;:[0,&quot;nephesh-siela&quot;],&quot;title_vernacular&quot;:[0,&quot;Nephesh – Siela&quot;],&quot;title&quot;:[0,&quot;Nephesh - Soul&quot;],&quot;subtitle&quot;:[0,&quot;&quot;],&quot;book&quot;:[0,&quot;&quot;],&quot;start_c&quot;:[0,&quot;&quot;],&quot;end_chapter&quot;:[0,&quot;&quot;],&quot;description&quot;:[0,&quot;Šiame filmuke, remdamiesi „Shema\\\&quot; malda, nagrinėjame hebrajų kalbos žodžio „nephesh\\\&quot;, paprastai verčiamo „siela\\\&quot;, reikšmes. Nors mes siela dažniausiai vadiname nemirtingą, nematerialų žmogaus pradą, pasiliekantį po mirties, Biblijoje „nephesh\\\&quot; reikšmė yra kiek kitokia. Šis žodis nusako žmogų kaip gyvą, alsuojančią, fizinę būtybę arba patį gyvenimą. Biblinė žodžio „siela\\\&quot; reikšmė jus gali ir nustebinti!\\n\\n&quot;],&quot;language&quot;:[0,&quot;Lithuanian / Lietuvių k.&quot;],&quot;iso&quot;:[0,&quot;lit&quot;],&quot;filesystem&quot;:[0,&quot;LITTBP_nephesh_siela&quot;],&quot;image&quot;:[0,&quot;TBPWS_TSS_NepheshSoul&quot;],&quot;youtube&quot;:[0,&quot;T1WaKdOQLDI&quot;]}],[0,{&quot;slug&quot;:[0,&quot;me-od-jega&quot;],&quot;title_vernacular&quot;:[0,&quot;Me&#39;od – Jėga&quot;],&quot;title&quot;:[0,&quot;Me&#39;od - Strength&quot;],&quot;subtitle&quot;:[0,&quot;&quot;],&quot;book&quot;:[0,&quot;&quot;],&quot;start_c&quot;:[0,&quot;&quot;],&quot;end_chapter&quot;:[0,&quot;&quot;],&quot;description&quot;:[0,&quot;Ką reiškia mylėti Dievą „visomis jėgomis“? Šioje, jau paskutinėje, „Shema“ serijos dalyje nagrinėjame daug reikšmių ir prasmių turintį hebrajų kalbos žodį „me‘od“, čia verčiamą kaip „jėgos“ arba „jėga“. Apie kitas jo reikšmes sužinosite pažiūrėję filmuką.\\n\\n&quot;],&quot;language&quot;:[0,&quot;Lithuanian / Lietuvių k.&quot;],&quot;iso&quot;:[0,&quot;lit&quot;],&quot;filesystem&quot;:[0,&quot;LITTBP_me_od_jega&quot;],&quot;image&quot;:[0,&quot;TBPWS_TSS_MeodStrength&quot;],&quot;youtube&quot;:[0,&quot;C5sSomtUXDU&quot;]}],[0,{&quot;slug&quot;:[0,&quot;yakhal-viltis&quot;],&quot;title_vernacular&quot;:[0,&quot;Yakhal – Viltis&quot;],&quot;title&quot;:[0,&quot;Yakhal - Hope&quot;],&quot;subtitle&quot;:[0,&quot;&quot;],&quot;book&quot;:[0,&quot;&quot;],&quot;start_c&quot;:[0,&quot;&quot;],&quot;end_chapter&quot;:[0,&quot;&quot;],&quot;description&quot;:[0,&quot;Biblijoje viltį turintys žmonės labai skiriasi nuo optimistų! Šiame vaizdo įraše pamatysime, kad biblinė viltis kliaujasi vien Dievu, laiduojančiu, jog ateitis bus geresnė nei dabartis.\\n\\n&quot;],&quot;language&quot;:[0,&quot;Lithuanian / Lietuvių k.&quot;],&quot;iso&quot;:[0,&quot;lit&quot;],&quot;filesystem&quot;:[0,&quot;LITTBP_yakhal_viltis&quot;],&quot;image&quot;:[0,&quot;TBPWS_ADV_Hope&quot;],&quot;youtube&quot;:[0,&quot;LPgzRb4UBVc&quot;]}],[0,{&quot;slug&quot;:[0,&quot;chara-dziaugsmas&quot;],&quot;title_vernacular&quot;:[0,&quot;Chara – Džiaugsmas&quot;],&quot;title&quot;:[0,&quot;Chara - Joy&quot;],&quot;subtitle&quot;:[0,&quot;&quot;],&quot;book&quot;:[0,&quot;&quot;],&quot;start_c&quot;:[0,&quot;&quot;],&quot;end_chapter&quot;:[0,&quot;&quot;],&quot;description&quot;:[0,&quot;Šiame vaizdo įraše nagrinėjame, kokį ypatingą džiaugsmą kviečiami patirti Dievo žmonės. Šis džiaugsmas – daugiau nei gera nuotaika ar linksmumas, tai veikiau apsisprendimas tikėti, kad Dievas įvykdys savo pažadus.\\n\\n&quot;],&quot;language&quot;:[0,&quot;Lithuanian / Lietuvių k.&quot;],&quot;iso&quot;:[0,&quot;lit&quot;],&quot;filesystem&quot;:[0,&quot;LITTBP_chara_dziaugsmas&quot;],&quot;image&quot;:[0,&quot;TBPWS_ADV_Joy&quot;],&quot;youtube&quot;:[0,&quot;R-27dmqvprU&quot;]}],[0,{&quot;slug&quot;:[0,&quot;agape-meile&quot;],&quot;title_vernacular&quot;:[0,&quot;Agape – Meilė&quot;],&quot;title&quot;:[0,&quot;Agape - Love&quot;],&quot;subtitle&quot;:[0,&quot;&quot;],&quot;book&quot;:[0,&quot;&quot;],&quot;start_c&quot;:[0,&quot;&quot;],&quot;end_chapter&quot;:[0,&quot;&quot;],&quot;description&quot;:[0,&quot;Žodis „meilė\\\&quot; yra vienas paviršutiniškiausių žodžių mūsų kalboje, nes juo pirmiausia nusakome žmogui kylančius jausmus. Naujajame Testamente „meilė\\\&quot; siejama su paties Jėzaus elgesiu ir nuostatomis kitų žmonių atžvilgiu. Pasak Jėzaus, tai siekti kitų gerovės nepriklausomai nuo jų atsako.\\n\\n&quot;],&quot;language&quot;:[0,&quot;Lithuanian / Lietuvių k.&quot;],&quot;iso&quot;:[0,&quot;lit&quot;],&quot;filesystem&quot;:[0,&quot;LITTBP_agape_meile&quot;],&quot;image&quot;:[0,&quot;TBPWS_ADV_Love&quot;],&quot;youtube&quot;:[0,&quot;6LMZfMJemCs&quot;]}],[0,{&quot;slug&quot;:[0,&quot;khata-nuodeme&quot;],&quot;title_vernacular&quot;:[0,&quot;Khata – Nuodėmė&quot;],&quot;title&quot;:[0,&quot;Khata - Sin&quot;],&quot;subtitle&quot;:[0,&quot;&quot;],&quot;book&quot;:[0,&quot;&quot;],&quot;start_c&quot;:[0,&quot;&quot;],&quot;end_chapter&quot;:[0,&quot;&quot;],&quot;description&quot;:[0,&quot;Žodis „nuodėmė\\\&quot; yra vienas iš dažniausių blogų žodžių Biblijoje. O ką jis iš tiesų reiškia? Šiame filmuke panagrinėsime „moralinės nesėkmės\\\&quot; sampratą, slypinčią už šio svarbaus biblinio žodžio. Pasirenkime skvarbiai ir realistiškai pažvelgti į žmogaus būklę.\\n\\n&quot;],&quot;language&quot;:[0,&quot;Lithuanian / Lietuvių k.&quot;],&quot;iso&quot;:[0,&quot;lit&quot;],&quot;filesystem&quot;:[0,&quot;LITTBP_khata_nuodeme&quot;],&quot;image&quot;:[0,&quot;TBPWS_BW_Sin&quot;],&quot;youtube&quot;:[0,&quot;EvocPQJkIyo&quot;]}],[0,{&quot;slug&quot;:[0,&quot;pesha-nusizengimas&quot;],&quot;title_vernacular&quot;:[0,&quot;Pesha – Nusižengimas&quot;],&quot;title&quot;:[0,&quot;Pesha - Transgression&quot;],&quot;subtitle&quot;:[0,&quot;&quot;],&quot;book&quot;:[0,&quot;&quot;],&quot;start_c&quot;:[0,&quot;&quot;],&quot;end_chapter&quot;:[0,&quot;&quot;],&quot;description&quot;:[0,&quot;Žodis „nusižengimas\\\&quot; yra iš tų Biblijos žodžių, kurie atrodo aiškūs, kol prireikia juos paaiškinti. Šiame filmuke pagvildensime šio biblinio „blogojo žodžio\\\&quot; itin įdomią ir sudėtingą prasmę. Pasirenkite blaivinančiam žmogaus prigimties apmąstymui.\\n\\n&quot;],&quot;language&quot;:[0,&quot;Lithuanian / Lietuvių k.&quot;],&quot;iso&quot;:[0,&quot;lit&quot;],&quot;filesystem&quot;:[0,&quot;LITTBP_pesha_nusizengimas&quot;],&quot;image&quot;:[0,&quot;TBPWS_BW_Transgression&quot;],&quot;youtube&quot;:[0,&quot;r2_7CakfpSE&quot;]}],[0,{&quot;slug&quot;:[0,&quot;avon-nedorybe&quot;],&quot;title_vernacular&quot;:[0,&quot;Avon – Nedorybė&quot;],&quot;title&quot;:[0,&quot;Avon - Wickedness&quot;],&quot;subtitle&quot;:[0,&quot;&quot;],&quot;book&quot;:[0,&quot;&quot;],&quot;start_c&quot;:[0,&quot;&quot;],&quot;end_chapter&quot;:[0,&quot;&quot;],&quot;description&quot;:[0,&quot;Biblinį žodį „nedorybė\\\&
