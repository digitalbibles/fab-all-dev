    const isDarkModePreferred = () => {
        return localStorage.theme === "dark" ||
               (!("theme" in localStorage) && window.matchMedia("(prefers-color-scheme: dark)").matches);
    };

    const toggleClasses = (element, condition, classesOn, classesOff) => {
        classesOn.forEach(cls => element.classList.toggle(cls, condition));
        classesOff.forEach(cls => element.classList.toggle(cls, !condition));
    };

    const toggleDarkMode = () => {
        const isDark = document.documentElement.classList.toggle("dark");
        updateTogglerUI(isDark);
        localStorage.theme = isDark ? "dark" : "light";
    };

    const preferredDarkMode = isDarkModePreferred();
    document.documentElement.classList.toggle("dark", preferredDarkMode);
    attachEvent("[data-aw-toggle-color-scheme]", "click", toggleDarkMode);
};

  function attachEvent(selector, event, fn) {
    const matches = document.querySelectorAll(selector)
    if (matches && matches.length) {
      matches.forEach((elem) => {
        elem.addEventListener(
          event,
          function () {
            fn(elem)
          },
          false
        )
      })
    }
  }

],[0,{&quot;slug&quot;:[0,&quot;buong-ideya-juan-1-12&quot;],&quot;title_vernacular&quot;:[0,&quot;Buong-ideya: Juan 1–12&quot;],&quot;title&quot;:[0,&quot;Overview: John 1–12&quot;],&quot;subtitle&quot;:[0,&quot;&quot;],&quot;book&quot;:[0,&quot;JHN&quot;],&quot;start_c&quot;:[0,&quot;&quot;],&quot;end_chapter&quot;:[0,&quot;&quot;],&quot;description&quot;:[0,&quot;Panoorin ang aming video tungkol sa buong-ideya ng Juan 1–12. Makikita dito ang disenyo at daloy ng kaisipan sa aklat. Sa aklat ni Juan pinakilala si Jesus bilang ang nagkatawang-tao na Diyos ng Israel at lumikha sa lahat, para ibahagi ang kanyang pag-ibig at kaloob na buhay na walang-hanggan para sa mundo.\\n\\n&quot;],&quot;language&quot;:[0,&quot;Tagalog&quot;],&quot;iso&quot;:[0,&quot;tgl&quot;],&quot;filesystem&quot;:[0,&quot;TGLTBP_buong_ideya_juan_1_12&quot;],&quot;image&quot;:[0,&quot;TBPEXP_NTS_John1&quot;],&quot;youtube&quot;:[0,&quot;x2tGVufM7J0&quot;]}],[0,{&quot;slug&quot;:[0,&quot;pinanganak-si-jesus-lucas-1-2&quot;],&quot;title_vernacular&quot;:[0,&quot;Pinanganak si Jesus: Lucas 1–2&quot;],&quot;title&quot;:[0,&quot;Jesus is born: Luke 1–2&quot;],&quot;subtitle&quot;:[0,&quot;&quot;],&quot;book&quot;:[0,&quot;LUK&quot;],&quot;start_c&quot;:[0,&quot;&quot;],&quot;end_chapter&quot;:[0,&quot;&quot;],&quot;description&quot;:[0,&quot;Ang una sa limang bahagi ng serye tungkol sa Ebanghelyo ayon kay Lucas. Titingnan natin ang mga pangyayari bago ipanganak si Jesus—ang mahirap na sitwasyon ng kanyang pamilya, at kanilang mababang lugar sa lipunan ng Israel, na nagpapahiwatig sa pabaligtad na katangian ng kahahrian ni Jesus&quot;],&quot;language&quot;:[0,&quot;Tagalog&quot;],&quot;iso&quot;:[0,&quot;tgl&quot;],&quot;filesystem&quot;:[0,&quot;TGLTBP_pinanganak_si_jesus_lucas_1_2&quot;],&quot;image&quot;:[0,&quot;TBPBC_LAC_Luke_1&quot;],&quot;youtube&quot;:[0,&quot;YU5vPxcWhhw&quot;]}],[0,{&quot;slug&quot;:[0,&quot;pagbautismo-kay-jesus-lucas-3-9&quot;],&quot;title_vernacular&quot;:[0,&quot;Pagbautismo kay Jesus: Lucas 3–9&quot;],&quot;title&quot;:[0,&quot;Baptism of Jesus: Luke 3–9&quot;],&quot;subtitle&quot;:[0,&quot;&quot;],&quot;book&quot;:[0,&quot;LUK&quot;],&quot;start_c&quot;:[0,&quot;&quot;],&quot;end_chapter&quot;:[0,&quot;&quot;],&quot;description&quot;:[0,&quot;Ang pangalawa sa limang bahagi ng serye tungkol sa Ebanghelyo ayon kay Lucas. Makikita natin dito kung paano nagsimula ang misyon ni Jesus, ang kanyang magandang balita para sa mahihirap, at kung paano niya pinagsama-sama ang mga tao mula sa iba&#39;t ibang klase ng pamumuhay para mamuhay nang magkakasama at may kapayapaan&quot;],&quot;language&quot;:[0,&quot;Tagalog&quot;],&quot;iso&quot;:[0,&quot;tgl&quot;],&quot;filesystem&quot;:[0,&quot;TGLTBP_pagbautismo_kay_jesus_lucas_3_9&quot;],&quot;image&quot;:[0,&quot;TBPBC_LAC_Luke_2&quot;],&quot;youtube&quot;:[0,&quot;OI4qXKCSiWk&quot;]}],[0,{&quot;slug&quot;:[0,&quot;ang-nawawalang-anak-lucas-9-19&quot;],&quot;title_vernacular&quot;:[0,&quot;Ang Nawawalang Anak: Lucas 9–19&quot;],&quot;title&quot;:[0,&quot;The Prodigal Son: Luke 9–19&quot;],&quot;subtitle&quot;:[0,&quot;&quot;],&quot;book&quot;:[0,&quot;LUK&quot;],&quot;start_c&quot;:[0,&quot;&quot;],&quot;end_chapter&quot;:[0,&quot;&quot;],&quot;description&quot;:[0,&quot;Ang ikatlong bahagi ay tumatalakay sa pinaka-sentro ng Ebanghelyo ni Lucas. Pinagpatuloy ni Jesus ang kanyang radikal na pangangaral tungkol sa magandang balita para sa mahihirap habang naglalakbay siya papunta sa Jerusalem. Pinatindi nito ang di-pagkakasundo sa pagitan niya at ng mga lider ng relihiyon sa Israel. Ang problemang ito ang magiging konteksto para sa sikat na kwento tungkol sa Nawawalang Anak&quot;],&quot;language&quot;:[0,&quot;Tagalog&quot;],&quot;iso&quot;:[0,&quot;tgl&quot;],&quot;filesystem&quot;:[0,&quot;TGLTBP_ang_nawawalang_anak_lucas_9_19&quot;],&quot;image&quot;:[0,&quot;TBPBC_LAC_Luke_3&quot;],&quot;youtube&quot;:[0,&quot;0krrutkHz5I&quot;]}],[0,{&quot;slug&quot;:[0,&quot;pinako-sa-krus-si-jesus-luke-19-23&quot;],&quot;title_vernacular&quot;:[0,&quot;Pinako sa krus si Jesus: Luke 19–23&quot;],&quot;title&quot;:[0,&quot;Jesus crucified: Luke 19–23&quot;],&quot;subtitle&quot;:[0,&quot;&quot;],&quot;book&quot;:[0,&quot;LUK&quot;],&quot;start_c&quot;:[0,&quot;&quot;],&quot;end_chapter&quot;:[0,&quot;&quot;],&quot;description&quot;:[0,&quot;Nagtapos ang misyon ni Jesus sa isang linggo na puno ng pagtatalo hanggang sa sumapit ang pagdiriwang ng Paskuwa. Sa video na ito, pag-uusapan ang Ebanghelyo ni Lucas 19–23, at kung paanong si Jesus, kahit walang kasalanan, ay pinatay na parang rebeldeng kalaban ng Roma. Makikita din natin na hindi na nagulat si Jesus, kasi naniniwala siya na ang kanyang kamatayan ang magbubukas ng bagong kinabukasan para sa Israel, at sa lahat ng mga tao&quot;],&quot;language&quot;:[0,&quot;Tagalog&quot;],&quot;iso&quot;:[0,&quot;tgl&quot;],&quot;filesystem&quot;:[0,&quot;TGLTBP_pinako_sa_krus_si_jesus_luke_19_23&quot;],&quot;image&quot;:[0,&quot;TBPBC_LAC_Luke_4&quot;],&quot;youtube&quot;:[0,&quot;QYWiL7LUNLA&quot;]}],[0,{&quot;slug&quot;:[0,&quot;ang-muling-pagkabuhay-ni-jesus-luke-24&quot;],&quot;title_vernacular&quot;:[0,&quot;Ang muling pagkabuhay ni Jesus: Luke 24&quot;],&quot;title&quot;:[0,&quot;The resurrection of Jesus: Luke 24&quot;],&quot;subtitle&quot;:[0,&quot;&quot;],&quot;book&quot;:[0,&quot;LUK&quot;],&quot;start_c&quot;:[0,&quot;&quot;],&quot;end_chapter&quot;:[0,&quot;&quot;],&quot;description&quot;:[0,&quot;Sa video na ito matatapos ang napakahusay na paglalarawan ni Lucas kay Jesus na taga-Nazareth. Natuklasan ng mga alagad ang libingan na walang laman. Iyon ang talagang bumago sa kanilang pananaw sa mundo, lalo na nang makita nila si Jesus na muling nabuhay. Pinakita ni Lucas ang pinaka-mahalagang tagpo sa misyon ni Jesus, ang kaharian ng Diyos. Hinahanda ni Lucas ang pagpapatuloy nito sa kanyang pangalawang aklat, ang mga Gawa&quot;],&quot;language&quot;:[0,&quot;Tagalog&quot;],&quot;iso&quot;:[0,&quot;tgl&quot;],&quot;filesystem&quot;:[0,&quot;TGLTBP_ang_muling_pagkabuhay_ni_jesus_luke_24&quot;],&quot;image&quot;:[0,&quot;TBPBC_LAC_Luke_5&quot;],&quot;youtube&quot;:[0,&quot;uWIb6-_mec0&quot;]}],[0,{&quot;slug&quot;:[0,&quot;pentecostes-mga-gawa-1-7&quot;],&quot;title_vernacular&quot;:[0,&quot;Pentecostes: Mga Gawa 1–7&quot;],&quot;title&quot;:[0,&quot;Pentecost: Acts 1–7&quot;],&quot;subtitle&quot;:[0,&quot;&quot;],&quot;book&quot;:[0,&quot;ACT&quot;],&quot;start_c&quot;:[0,&quot;&quot;],&quot;end_chapter&quot;:[0,&quot;&quot;],&quot;description&quot;:[0,&quot;Ang Aklat ng mga Gawa ang nagpapakita kung paano tinupad ng Diyos ang kanyang mga pangako na ibabalik ang pagpapala sa lahat ng bansa sa tulong ng anak ni Abraham: si Jesus na taga-Nazareth. Sa video na ito, pag-aaralan natin kung paano binago ni Jesus at ng kanyang Espiritu ang mga tao sa Israel para ihanda sila sa pangangaral ng magandang balita sa mga bansa&quot;],&quot;language&quot;:[0,&quot;Tagalog&quot;],&quot;iso&quot;:[0,&quot;tgl&quot;],&quot;filesystem&quot;:[0,&quot;TGLTBP_pentecostes_mga_gawa_1_7&quot;],&quot;image&quot;:[0,&quot;TBPBC_LAC_Acts_1&quot;],&quot;youtube&quot;:[0,&quot;daSKx5N8cgE&quot;]}],[0,{&quot;slug&quot;:[0,&quot;si-apostol-pablo-mga-gawa-8-12&quot;],&quot;title_vernacular&quot;:[0,&quot;Si Apostol Pablo: Mga Gawa 8–12&quot;],&quot;title&quot;:[0,&quot;The Apostle Paul: Acts 8–12&quot;],&quot;subtitle&quot;:[0,&quot;&quot;],&quot;book&quot;:[0,&quot;ACT&quot;],&quot;start_c&quot;:[0,&quot;&quot;],&quot;end_chapter&quot;:[0,&quot;&quot;],&quot;description&quot;:[0,&quot;Tatalakayin sa video ng Acts 8–12 kung paano binago ng Espiritu ng Diyos ang mga tagasunod ni Jesus. Nagsimula sila sa isang maliit na grupo ng mga Judio sa Jerusalem na naniniwala sa Mesias hanggang sa maging isang kilusan na binubuo ng iba&#39;t ibang lahi, at lumaganap sa lahat ng mga bansa&quot;],&quot;language&quot;:[0,&quot;Tagalog&quot;],&quot;iso&quot;:[0,&quot;tgl&quot;],&quot;filesystem&quot;:[0,&quot;TGLTBP_si_apostol_pabl
