const setDarkMode = () => {
    const isDarkModePreferred = () => {
        return localStorage.theme === "dark" ||
               (!("theme" in localStorage) && window.matchMedia("(prefers-color-scheme: dark)").matches);
    };

    const toggleClasses = (element, condition, classesOn, classesOff) => {
        classesOn.forEach(cls => element.classList.toggle(cls, condition));
        classesOff.forEach(cls => element.classList.toggle(cls, !condition));
    };

    const toggleDarkMode = () => {
        const isDark = document.documentElement.classList.toggle("dark");
        updateTogglerUI(isDark);
        localStorage.theme = isDark ? "dark" : "light";
    };

    const preferredDarkMode = isDarkModePreferred();
    document.documentElement.classList.toggle("dark", preferredDarkMode);
    attachEvent("[data-aw-toggle-color-scheme]", "click", toggleDarkMode);
};



    document.addEventListener("DOMContentLoaded", setDarkMode);
    document.addEventListener("astro:after-swap", setDarkMode);


  function attachEvent(selector, event, fn) {
    const matches = document.querySelectorAll(selector)
    if (matches && matches.length) {
      matches.forEach((elem) => {
        elem.addEventListener(
          event,
          function () {
            fn(elem)
          },
          false
        )
      })
    }
  }

	to-secondary-500 dark:from-primary-800 dark:via-primary-900 dark:to-secondary-800"></div>  </div> <astro-island uid="Z1Eu20P" component-url="/_astro/FilmGalleries.oke3Ae9a.js" component-export="default" renderer-url="/_astro/client.CWY0IrnN.js" props="{&quot;bibleProjectFilms&quot;:[1,[[0,{&quot;slug&quot;:[0,&quot;il-libro-dei-proverbi&quot;],&quot;title_vernacular&quot;:[0,&quot;Il Libro dei Proverbi&quot;],&quot;title&quot;:[0,&quot;The Book of Proverbs&quot;],&quot;subtitle&quot;:[0,&quot;&quot;],&quot;book&quot;:[0,&quot;PRO&quot;],&quot;start_c&quot;:[0,&quot;&quot;],&quot;end_chapter&quot;:[0,&quot;&quot;],&quot;description&quot;:[0,&quot;I Proverbi sono costituiti da una raccolta di conoscenze acquisite nel corso di generazioni da parte di acuti e sagaci uomini e donne di Dio. Promuovono una vita di virtù e \\\&quot;timore di Dio,\\\&quot; e ci danno la possibilità di vivere appieno una \\\&quot;buona vita\\\&quot;. I Proverbi appartengono ad una serie di tre libri che esplorano questi temi di sapienza biblica. \\n\\n\\n\\nRiconoscimenti:\\nContenuti Originali in lingua Inglese e Produzione a cura di: BibleProject, Portland, Oregon, USA\\nProduzione e Localizzazione in lingua Italiana:  Superhuit, Losanna, Svizzera&quot;],&quot;language&quot;:[0,&quot;Italiano&quot;],&quot;iso&quot;:[0,&quot;ita&quot;],&quot;filesystem&quot;:[0,&quot;ITATBP_il_libro_dei_proverbi&quot;],&quot;image&quot;:[0,&quot;TBPBC_WIS_Proverbs&quot;],&quot;youtube&quot;:[0,&quot;oZhUfXLzHfM&quot;]}],[0,{&quot;slug&quot;:[0,&quot;il-libro-dell-ecclesiaste&quot;],&quot;title_vernacular&quot;:[0,&quot;Il Libro dell’Ecclesiaste&quot;],&quot;title&quot;:[0,&quot;The Book of Ecclesiastes&quot;],&quot;subtitle&quot;:[0,&quot;&quot;],&quot;book&quot;:[0,&quot;ECC&quot;],&quot;start_c&quot;:[0,&quot;&quot;],&quot;end_chapter&quot;:[0,&quot;&quot;],&quot;description&quot;:[0,&quot;Nell’Ecclesiaste ascoltiamo la voce scettica del cosiddetto \\\&quot;insegnante\\\&quot;. Egli osserva che vivere secondo gli insegnamenti del libro dei Proverbi non porta sempre a risultati positivi. A volte la vita è difficile, e supera ogni possibile spiegazione logica. Come possiamo vivere con questa tensione, e al contempo sforzarci di perseguire la saggezza? L’Ecclesiaste è il secondo dei Libri Sapienziali.\\n\\n&#39;Ecclesiaste\\n\\nRiconoscimenti:\\nContenuti Originali in lingua Inglese e Produzione a cura di: BibleProject, Portland, Oregon, USA\\nProduzione e Localizzazione in lingua Italiana:  Superhuit, Losanna, Svizzera&quot;],&quot;language&quot;:[0,&quot;Italiano&quot;],&quot;iso&quot;:[0,&quot;ita&quot;],&quot;filesystem&quot;:[0,&quot;ITATBP_il_libro_dell_ecclesiaste&quot;],&quot;image&quot;:[0,&quot;TBPBC_WIS_Ecclesiastes&quot;],&quot;youtube&quot;:[0,&quot;PPtNACIktBU&quot;]}],[0,{&quot;slug&quot;:[0,&quot;il-libro-di-giobbe&quot;],&quot;title_vernacular&quot;:[0,&quot;Il Libro di Giobbe&quot;],&quot;title&quot;:[0,&quot;The Book of Job&quot;],&quot;subtitle&quot;:[0,&quot;&quot;],&quot;book&quot;:[0,&quot;JOB&quot;],&quot;start_c&quot;:[0,&quot;&quot;],&quot;end_chapter&quot;:[0,&quot;&quot;],&quot;description&quot;:[0,&quot;Come possiamo credere in Dio anche quando la vita è ingiusta e soffriamo senza alcuna buona ragione? La storia di Giobbe ci invita a riflettere su cosa significhi che Dio governa il mondo con saggezza, e come questa verità può portare pace in tempi oscuri. Giobbe è l’ultimo dei tre libri che esplorano questi temi di sapienza biblica.\\n\\n\\n\\nRiconoscimenti:\\nContenuti Originali in lingua Inglese e Produzione a cura di: BibleProject, Portland, Oregon, USA\\nProduzione e Localizzazione in lingua Italiana:  Superhuit, Losanna, Svizzera&quot;],&quot;language&quot;:[0,&quot;Italiano&quot;],&quot;iso&quot;:[0,&quot;ita&quot;],&quot;filesystem&quot;:[0,&quot;ITATBP_il_libro_di_giobbe&quot;],&quot;image&quot;:[0,&quot;TBPBC_WIS_Job&quot;],&quot;youtube&quot;:[0,&quot;93KJRlNxDSU&quot;]}],[0,{&quot;slug&quot;:[0,&quot;spirito-santo&quot;],&quot;title_vernacular&quot;:[0,&quot;Spirito Santo&quot;],&quot;title&quot;:[0,&quot;Holy Spirit&quot;],&quot;subtitle&quot;:[0,&quot;&quot;],&quot;book&quot;:[0,&quot;&quot;],&quot;start_c&quot;:[0,&quot;&quot;],&quot;end_chapter&quot;:[0,&quot;&quot;],&quot;description&quot;:[0,&quot;In questo video esaminiamo il significato originario del concetto biblico dello \\\&quot;spirito\\\&quot;, e vedremo cosa significa che lo Spirito di Dio è personalmente presente e coinvolto nel&#39;intero processo della creazione. Fondamentalmente, lo Spirito Santo fu rivelato per mezzo di Gesù e fu inviato nelle vite dei Suoi seguaci, per portare a compimento la nuova creazione.\\n\\n\\n\\nRiconoscimenti:\\nContenuti Originali in lingua Inglese e Produzione a cura di: BibleProject, Portland, Oregon, USA\\nProduzione e Localizzazione in lingua Italiana:  Superhuit, Losanna, Svizzera&quot;],&quot;language&quot;:[0,&quot;Italiano&quot;],&quot;iso&quot;:[0,&quot;ita&quot;],&quot;filesystem&quot;:[0,&quot;ITATBP_spirito_santo&quot;],&quot;image&quot;:[0,&quot;TBPEXP_THM_HolySpirit&quot;],&quot;youtube&quot;:[0,&quot;0_jZRlrSSO8&quot;]}],[0,{&quot;slug&quot;:[0,&quot;il-vangelo-del-regno&quot;],&quot;title_vernacular&quot;:[0,&quot;Il Vangelo del Regno&quot;],&quot;title&quot;:[0,&quot;The gospel of the kingdom&quot;],&quot;subtitle&quot;:[0,&quot;&quot;],&quot;book&quot;:[0,&quot;&quot;],&quot;start_c&quot;:[0,&quot;&quot;],&quot;end_chapter&quot;:[0,&quot;&quot;],&quot;description&quot;:[0,&quot;In questo video individuiamo le origini della parola \\\&quot;vangelo\\\&quot; e spieghiamo il modo in cui relaziona la storia dell’Antico Testamento con quella di Gesù, e con la Sua dichiarazione del regno di Dio. Il regno divino portato da Gesù nel mondo è un regno alla rovescia. E questo regno alla rovescia è la notizia migliore che potessimo mai ricevere.\\n\\n\\n\\nRiconoscimenti:\\nContenuti Originali in lingua Inglese e Produzione a cura di: BibleProject, Portland, Oregon, USA\\nProduzione e Localizzazione in lingua Italiana:  Superhuit, Losanna, Svizzera&quot;],&quot;language&quot;:[0,&quot;Italiano&quot;],&quot;iso&quot;:[0,&quot;ita&quot;],&quot;filesystem&quot;:[0,&quot;ITATBP_il_vangelo_del_regno&quot;],&quot;image&quot;:[0,&quot;TBPEXP_THM_GospeloftheKingdom&quot;],&quot;youtube&quot;:[0,&quot;hYJHUNj5XIU&quot;]}],[0,{&quot;slug&quot;:[0,&quot;lettura-pubblica-delle-scritture&quot;],&quot;title_vernacular&quot;:[0,&quot;Lettura Pubblica delle Scritture&quot;],&quot;title&quot;:[0,&quot;Public Reading of the Scriptures&quot;],&quot;subtitle&quot;:[0,&quot;&quot;],&quot;book&quot;:[0,&quot;&quot;],&quot;start_c&quot;:[0,&quot;&quot;],&quot;end_chapter&quot;:[0,&quot;&quot;],&quot;description&quot;:[0,&quot;Leggere la Bibbia ad alta voce insieme a un gruppo di persone costituisce una pratica antica. Difatti, le origini della Bibbia sono fortemente radicate nella pratica della lettura pubblica della Scrittura. Esplora insieme a noi le origini e lo sviluppo di questo affascinante tema biblico, e il modo in cui ci offre un modello da seguire per relazionarci alle Scritture ai giorni nostri.\\n\\n\\n\\nRiconoscimenti:\\nContenuti Originali in lingua Inglese e Produzione a cura di: BibleProject, Portland, Oregon, USA\\nProduzione e Localizzazione in lingua Italiana:  Superhuit, Losanna, Svizzera&quot;],&quot;language&quot;:[0,&quot;Italiano&quot;],&quot;iso&quot;:[0,&quot;ita&quot;],&quot;filesystem&quot;:[0,&quot;ITATBP_lettura_pubblica_delle_scritture&quot;],&quot;image&quot;:[0,&quot;TBPEXP_THM_PublicReadingofScripture&quot;],&quot;youtube&quot;:[0,&quot;gaVLUlxqeSE&quot;]}],[0,{&quot;slug&quot;:[0,&quot;la-generosita&quot;],&quot;title_vernacular&quot;:[0,&quot;La Generosità&quot;],&quot;title&quot;:[0,&quot;The Generosity&quot;],&quot;subtitle&quot;:[0,&quot;&quot;],&quot;book&quot;:[0,&quot;&quot;],&quot;start_c&quot;:[0,&quot;&quot;],&quot;end_chapter&quot;:[0,&quot;&quot;],&quot;description&quot;:[0,&quot;Nella storia della Bibbia, Dio viene rappresentato come un padrone di casa generoso, pronto a provvedere a ogni necessità dei Suoi ospiti. Tuttavia, gli uomini sono fondamentalmente motivati da una mentalità orientata alla  scarsità delle risorse, e per questo accumulano e mettono da parte i molti doni di Dio. In questo video sulla generosità, esploriamo il piano di Dio per sconfiggere il nostro egoismo, facendo dono supremo di Se Stesso nella persona di Gesù.\\n\\n\\n\\nRiconoscimenti:\\nContenuti Originali in lingua Inglese e Produzione a cura di: BibleProject, Portland, Oregon, USA\\nProduzione e Localizzazione in lingua Italiana:  Superhuit, Losanna, Svizzera&quot;],&quot;language&quot;:[0,&quot;Italiano&quot;],&quot;iso&quot;:[0,&quot;ita&quot;],&quot;filesystem&quot;:[0,&quot;ITATBP_la_generosita&quot;],&quot;image&quot;:[0,&quot;TBPEXP_THM_Generosity&quot;],&quot;youtube&quot;:[0,&quot;1nx3FmCsqIc&quot;]}],[0,{&quot;slug&quot;:[0,&quot;dio&quot;],&quot;title_vernacular&quot;:[0,&quot;Dio&quot;],&quot;title&quot;:[0,&quot;God&quot;],&quot;subtitle&quot;:[0,&quot;&quot;],&quot;book&quot;:[0,&quot;&quot;],&quot;start_c&quot;:[0,&quot;&quot;],&quot;end_chapter&quot;:[0,&quot;&quot;],&quot;description&quot;:[0,&quot;Il Dio rappresentato nella Bibbia non è oggettivamente facile da capire. Ci sarebbe di grande aiuto se potessimo definire meglio cos’è esattamente che non possiamo capire? \\nIn questo video esploriamo l’identità complessa di Dio, così come ci viene mostrata nella storia della Bibbia. E (che sorpresa!), tutto ci porta verso Gesù.\\n\\n\\n\\nRiconoscimenti:\\nContenuti Originali in lingua Inglese e Produzione a cura di: BibleProject, Portland, Oregon, USA\\nProduzione e Localizzazione in lingua Italiana:  Superhuit, Losanna, Svizzera&quot;],&quot;language&quot;:[0,&quot;Italiano&quot;],&quot;iso&quot;:[0,&quot;ita&quot;],&quot;filesystem&quot;:[0,&quot;ITATBP_dio&quot;],&quot;image&quot;:[0,&quot;TBPEXP_THM_God&quot;],&quot;youtube&quot;:[0,&quot;DaLS1ckIyl8&quot;]}],[0,{&quot;slug&quot;:[0,&quot;cielo-e-terra&quot;],&quot;title_vernacular&quot;:[0,&quot;Cielo e Terra&quot;],&quot;title&quot;:[0,&quot;Heaven and Earth&quot;],&quot;subtitle&quot;:[0,&quot;&quot;],&quot;book&quot;:[0,&quot;&quot;],&quot;start_c&quot;:[0,&quot;&quot;],&quot;end_chapter&quot;:[0,&quot;&quot;],&quot;description&quot;:[0,&quot;Cosa insegna realmente la Bibbia in merito al Cielo e qual è la relazione tra Cielo e Terra? In questo video esaminiamo il sorprendente punto di vista biblico, secondo il quale, in origine, il Cielo e la Terra si sarebbero dovuti sovrapporre. Vedremo inoltre come Gesù abbia il compito di unificarli definitivamente. \\n\\n\\n\\nRiconoscimenti:\\nContenuti Originali in lingua Inglese e Produzione a cura di: BibleProject, Portland, Oregon, USA\\nProduzione e Localizzazione in lingua Italiana:  Superhuit, Losanna, Svizzera&quot;],&quot;language&quot;:[0,&quot;Italiano&quot;],&quot;iso&quot;:[0,&quot;ita&quot;],&quot;filesystem&quot;:[0,&quot;ITATBP_cielo_e_terra&quot;],&quot;image&quot;:[0,&quot;TBPEXP_THM_HeavenAndEarth&quot;],&quot;youtube&quot;:[0,&quot;rcp7dV3R8Hw&quot;]}],[0,{&quot;slug&quot;:[0,&quot;shabbat-il-sabato&quot;],&quot;title_vernacular&quot;:[0,&quot;Shabbat- Il Sabato&quot;],&quot;title&quot;:[0,&quot;Shabbat - Saturday&quot;],&quot;subtitle&quot;:[0,&quot;&quot;],&quot;book&quot;:[0,&quot;&quot;],&quot;start_c&quot;:[0,&quot;&quot;],&quot;end_chapter&quot;:[0,&quot;&quot;],&quot;description&quot;:[0,&quot;Nella prima pagina della Bibbia, Dio crea un mondo meraviglioso e ordinato a partire dall’oscurità e dal caos, in una sequenza di sei giorni. Il settimo giorno Dio riposa. Ciò introduce l’importante tema biblico della serie di \\\&quot;sette\\\&quot;, che si conclude con una meravigliosa immagine che vede Dio e gli uomini vivere insieme questa promessa del \\\&quot;riposo\\\&quot;. In questo video esploriamo il tema del settimo giorno di riposo e il concetto biblico dello Shabbat. Vedremo anche perché Gesù adottò questa idea come componente essenziale della Sua missione: portare il regno di Dio sulla Terra.\\n\\n\\n\\nRiconoscimenti:\\nContenuti Originali in lingua Inglese e Produzione a cura di: BibleProject, Portland, Oregon, USA\\nProduzione e Localizzazione in lingua Italiana:  Superhuit, Losanna, Svizzera&quot;],&quot;language&quot;:[0,&quot;Italiano&quot;],&quot;iso&quot;:[0,&quot;ita&quot;],&quot;filesystem&quot;:[0,&quot;ITATBP_shabbat_il_sabato&quot;],&quot;image&quot;:[0,&quot;TBPEXP_THM_Sabbath&quot;],&quot;youtube&quot;:[0,&quot;lwl0Gz3gM0Y&quot;]}],[0,{&quot;slug&quot;:[0,&quot;immagine-di-dio&quot;],&quot;title_vernacular&quot;:[0,&quot;Immagine di Dio&quot;],&quot;title&quot;:[0,&quot;Image of God&quot;],&quot;subtitle&quot;:[0,&quot;&quot;],&quot;book&quot;:[0,&quot;&quot;],&quot;start_c&quot;:[0,&quot;&quot;],&quot;end_chapter&quot;:[0,&quot;&quot;],&quot;description&quot;:[0,&quot;Questo video, intitolato \\\&quot;lmmagine di Dio\\\&quot;, riprende l’idea degli esseri umani quali co-reggenti al fianco di Dio, incaricati di occuparsi dello sviluppo del mondo e delle sue risorse, per portarlo a nuovi orizzonti. In che modo questa vocazione umana è stata compromessa dall’egoismo e dal male, e in che modo Gesù ha istituito un nuovo modo di essere umani per mezzo della Sua vita, morte e resurrezione?\\n\\n\\n\\nRiconoscimenti:\\nContenuti Originali in lingua Inglese e Produzione a cura di: BibleProject, Portland, Oregon, USA\\nProduzione e Localizzazione in lingua Italiana:  Superhuit, Losanna, Svizzera&quot;],&quot;language&quot;:[0,&quot;Italiano&quot;],&quot;iso&quot;:[0,&quot;ita&quot;],&quot;filesystem&quot;:[0,&quot;ITATBP_immagine_di_dio&quot;],&quot;image&quot;:[0,&quot;TBPEXP_THM_ImageofGod&quot;],&quot;youtube&quot;:[0,&quot;2NxwW7Am_ZI&quot;]}],[0,{&quot;slug&quot;:[0,&quot;panoramica-l-antico-testamento-tanak&quot;],&quot;title_vernacular&quot;:[0,&quot;Panoramica: L’Antico Testamento / TaNaK&quot;],&quot;title&quot;:[0,&quot;The Old Testament / TaNaK&quot;],&quot;subtitle&quo
