const setDarkMode = () => {
    const isDarkModePreferred = () => {
        return localStorage.theme === "dark" ||
               (!("theme" in localStorage) && window.matchMedia("(prefers-color-scheme: dark)").matches);
    };

    const toggleClasses = (element, condition, classesOn, classesOff) => {
        classesOn.forEach(cls => element.classList.toggle(cls, condition));
        classesOff.forEach(cls => element.classList.toggle(cls, !condition));
    };

    const toggleDarkMode = () => {
        const isDark = document.documentElement.classList.toggle("dark");
        updateTogglerUI(isDark);
        localStorage.theme = isDark ? "dark" : "light";
    };

    const preferredDarkMode = isDarkModePreferred();
    document.documentElement.classList.toggle("dark", preferredDarkMode);
    attachEvent("[data-aw-toggle-color-scheme]", "click", toggleDarkMode);
};



    document.addEventListener("DOMContentLoaded", setDarkMode);

  function attachEvent(selector, event, fn) {
    const matches = document.querySelectorAll(selector)
    if (matches && matches.length) {
      matches.forEach((elem) => {
        elem.addEventListener(
          event,
          function () {
            fn(elem)
          },
          false
        )
      })
    }
  }

;PER&quot;],&quot;continent_id&quot;:[0,&quot;SA&quot;],&quot;iso_num&quot;:[0,604],&quot;language_count&quot;:[0,114],&quot;religion_primary&quot;:[0,&quot;Christianity&quot;],&quot;introduction&quot;:[0,&quot;Ancient Peru was the seat of several prominent Andean civilizations most notably that of the Incas whose empire was captured by Spanish conquistadors in 1533. Peru declared its independence in 1821 and remaining Spanish forces were defeated in 1824. After a dozen years of military rule Peru returned to democratic leadership in 1980 but experienced economic problems and the growth of a violent insurgency. President Alberto FUJIMORI&#39;s election in 1990 ushered in a decade that saw a dramatic turnaround in the economy and significant progress in curtailing guerrilla activity. Nevertheless the president&#39;s increasing reliance on authoritarian measures and an economic slump in the late 1990s generated mounting dissatisfaction with his regime which led to his resignation in 2000. A caretaker government oversaw a new election in the spring of 2001 which installed Alejandro TOLEDO Manrique as the new head of government - Peru&#39;s first democratically elected president of indigenous ethnicity. The presidential election of 2006 saw the return of Alan GARCIA Perez who after a disappointing presidential term from 1985 to 1990 oversaw a robust economic rebound. Former army officer Ollanta HUMALA Tasso was elected president in June 2011 and carried on the sound market-oriented economic policies of the three preceding administrations. Poverty and unemployment levels have fallen dramatically in the last decade and today Peru boasts one of the best performing economies in Latin America. Pedro Pablo KUCZYNSKI Godard won a very narrow presidential runoff election in June 2016.&quot;],&quot;overview&quot;:[0,&quot;&#39;Peru is a country in South America that&#39;&#39;s home to a section of Amazon rainforest and Machu Picchu an ancient Incan city high in the Andes mountai
