const setDarkMode = () => {
    const isDarkModePreferred = () => {
        return localStorage.theme === "dark" ||
               (!("theme" in localStorage) && window.matchMedia("(prefers-color-scheme: dark)").matches);
    };

    const toggleClasses = (element, condition, classesOn, classesOff) => {
        classesOn.forEach(cls => element.classList.toggle(cls, condition));
        classesOff.forEach(cls => element.classList.toggle(cls, !condition));
    };

    const toggleDarkMode = () => {
        const isDark = document.documentElement.classList.toggle("dark");
        updateTogglerUI(isDark);
        localStorage.theme = isDark ? "dark" : "light";
    };

    const preferredDarkMode = isDarkModePreferred();
    document.documentElement.classList.toggle("dark", preferredDarkMode);
    attachEvent("[data-aw-toggle-color-scheme]", "click", toggleDarkMode);
};



    document.addEventListener("DOMContentLoaded", setDarkMode);

  function attachEvent(selector, event, fn) {
    const matches = document.querySelectorAll(selector)
    if (matches && matches.length) {
      matches.forEach((elem) => {
        elem.addEventListener(
          event,
          function () {
            fn(elem)
          },
          false
        )
      })
    }
  }

&quot;RUS&quot;],&quot;continent_id&quot;:[0,&quot;EU&quot;],&quot;iso_num&quot;:[0,643],&quot;language_count&quot;:[0,160],&quot;religion_primary&quot;:[0,&quot;Christianity&quot;],&quot;introduction&quot;:[0,&quot;Founded in the 12th century the Principality of Muscovy was able to emerge from over 200 years of Mongol domination (13th-15th centuries) and to gradually conquer and absorb surrounding principalities. In the early 17th century a new ROMANOV Dynasty continued this policy of expansion across Siberia to the Pacific. Under PETER I (ruled 1682-1725) hegemony was extended to the Baltic Sea and the country was renamed the Russian Empire. During the 19th century more territorial acquisitions were made in Europe and Asia. Defeat in the Russo-Japanese War of 1904-05 contributed to the Revolution of 1905 which resulted in the formation of a parliament and other reforms. Repeated devastating defeats of the Russian army in World War I led to widespread rioting in the major cities of the Russian Empire and to the overthrow in 1917 of the imperial household. The communists under Vladimir LENIN seized power soon after and formed the USSR. The brutal rule of Iosif STALIN (1928-53) strengthened communist rule and Russian dominance of the Soviet Union at a cost of tens of millions of lives. After defeating Germany in World War II as part of an alliance with the US (1939-1945) the USSR expanded its territory and influence in Eastern Europe and emerged as a global power. The USSR was the principal adversary of the US during the Cold War (1947-1991). The Soviet economy and society stagnated in the decades following Stalin’s rule until General Secretary Mikhail GORBACHEV (1985-91) introduced glasnost (openness) and perestroika (restructuring) in an attempt to modernize communism but his initiatives inadvertently released forces that by December 1991 splintered the USSR into Russia and 14 other independent republics. ++ Following economic and political turmoil during President Boris YELTSIN&#39;s term (1991-99) Russia shifted toward a centralized authoritarian state under the leadership of President Vladimir PUTIN (2000-2008 2012-present) in which the regime seeks to legitimize its rule through managed elections populist appeals a foreign policy focused on enhancing the country&#39;s geopolitical influence and commodity-based economic growth. Russia faces a largely subdued rebel movement in Chechnya and some other surrounding regions although violence still occurs throughout the North Caucasus.&quot;],&quot;overview&quot;:[0,&quot;&#39;Russia the world’s largest nation borders European and Asian countries as well as the Pacific and Arctic oceans. Its landscape ranges from tundra and forests to subtropical beaches. It’s famous for Moscow&#39;&#39;s Bolshoi and St. Petersburg&#39;&#39;s Mariinsky ballet companies. St. Petersburg founded by Russian leader Peter the Great has the baroque Winter Palace now housing part of the State Hermitage Museum’s art collection.&#39;&quot;],&quot;independent&quot;:[0,1],&quot;landmass_km&quot;:[0,16376870],&quot;population_christian&quot;:[0,99775000],&quot;population_christian_percentage&quot;:[0,77],&quot;population_catholic_percentage&quot;:[0,0.1],&quot;population_protestant_percentage&quot;:[0,77],&quot;population_refugee&quot;:[0,42433],&quot;population_migration&quot;:[0,182456],&quot;population_year_change&quot;:[0,0.04],&quot;population_density_km&quot;:[0,9],&quot;population_average_age&quot;:[0,40],&quot;population_urban_percentage&quot;:[0,74],&quot;population_literacy_percentage&quot;:[0,100],&quot;region_code&quot;:[0,9],&quot;region_id&quot;:[0,151],&quot;region_name&quot;:[0,&quot;Eastern Europe&quot;],&quot;url_wiki&quot;:[0,&quot;https://en.wikipedia.org/wiki/Russia&quot;],&quot;url_britannica&quot;:[0,&quot;https://www.britannica.com/place/Russia&quot;],&quot;url_national_society&quot;:[0,&quot;http://www.biblia.ru/&quot;],&quot;url_ubs&quot;:[0,&quot;https://unitedbiblesocieties.org/lo
