const setDarkMode = () => {
    const isDarkModePreferred = () => {
        return localStorage.theme === "dark" ||
               (!("theme" in localStorage) && window.matchMedia("(prefers-color-scheme: dark)").matches);
    };

    const toggleClasses = (element, condition, classesOn, classesOff) => {
        classesOn.forEach(cls => element.classList.toggle(cls, condition));
        classesOff.forEach(cls => element.classList.toggle(cls, !condition));
    };

    const toggleDarkMode = () => {
        const isDark = document.documentElement.classList.toggle("dark");
        updateTogglerUI(isDark);
        localStorage.theme = isDark ? "dark" : "light";
    };

    const preferredDarkMode = isDarkModePreferred();
    document.documentElement.classList.toggle("dark", preferredDarkMode);
    attachEvent("[data-aw-toggle-color-scheme]", "click", toggleDarkMode);
};



    document.addEventListener("DOMContentLoaded", setDarkMode);

  function attachEvent(selector, event, fn) {
    const matches = document.querySelectorAll(selector)
    if (matches && matches.length) {
      matches.forEach((elem) => {
        elem.addEventListener(
          event,
          function () {
            fn(elem)
          },
          false
        )
      })
    }
  }

st share of seats in the CA and in February 2014 formed a coalition government with the second place Communist Party of Nepal-Unified Marxist-Leninist and with Nepali Congress President Sushil KOIRALA as prime minister. Nepal&#39;s new constitution came into effect in September 2015.&quot;],&quot;overview&quot;:[0,&quot;Nepal officially the Federal Democratic Republic of Nepal is a landlocked country in South Asia located mainly in the Himalayas but also includes parts of the Indo-Gangetic Plain.&quot;],&quot;independent&quot;:[0,1],&quot;landmass_km&quot;:[0,143350],&quot;population_christian&quot;:[0,269000],&quot;population_christian_percentage&quot;:[0,0.9],&quot;population_catholic_percentage&quot;:[0,0.1],&quot;population_protestant_percentage&quot;:[0,0.8],&quot;population_refugee&quot;:[0,19574],&quot;population_migration&quot;:[0,41710],&quot;population_year_change&quot;:[0,1.85],&quot;population_density_km&quot;:[0,203],&quot;population_average_age&quot;:[0,25],&quot;population_urban_percentage&quot;:[0,21],&quot;population_literacy_percentage&quot;:[0,85],&quot;region_code&quot;:[0,4],&quot;region_id&quot;:[0,34],&quot;region_name&quot;:[0,&quot;Southern Asia&quot;],&quot;url_wiki&quot;:[0,&quot;https://en.wikipedia.org/wiki/Nepal&quot;],&quot;url_britannica&quot;:[0,&quot;https://www.britannica.com/place/Nepal&quot;],&quot;url_national_society&quot;:[0,&quot;http://www.nepalbiblesociety.org/site/&quot;],&quot;url_ubs&quot;:[0,&quot;https://unitedbiblesocieties.org/locations/nepal-bible-society/&quot;],&quot;url_factbook&quot;:[0,&quot;https://www.cia.gov/the-world-factbook/countries/nepal/&quot;],&quot;url_factbook_pdf&quot;:[0,&quot;https://images.bible.cloud/maps/summary/NP-summary.pdf&quot;],&quot;url_human_development&quot;:[0,&quot;https://hdr.undp.org/data-center/specific-country-data#/countries/NPL&quot;],&quot;url_nations_online&quot;:[0,&quot;https://www.nationsonline.org/oneworld/nepal.htm&quot;],&quot;url_odp&quot;:[0,&quot;https://curlie.org/
