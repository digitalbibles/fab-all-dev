const setDarkMode = () => {
    const isDarkModePreferred = () => {
        return localStorage.theme === "dark" ||
               (!("theme" in localStorage) && window.matchMedia("(prefers-color-scheme: dark)").matches);
    };

    const toggleClasses = (element, condition, classesOn, classesOff) => {
        classesOn.forEach(cls => element.classList.toggle(cls, condition));
        classesOff.forEach(cls => element.classList.toggle(cls, !condition));
    };

    const toggleDarkMode = () => {
        const isDark = document.documentElement.classList.toggle("dark");
        updateTogglerUI(isDark);
        localStorage.theme = isDark ? "dark" : "light";
    };

    const preferredDarkMode = isDarkModePreferred();
    document.documentElement.classList.toggle("dark", preferredDarkMode);
    attachEvent("[data-aw-toggle-color-scheme]", "click", toggleDarkMode);
};



    document.addEventListener("DOMContentLoaded", setDarkMode);

  function attachEvent(selector, event, fn) {
    const matches = document.querySelectorAll(selector)
    if (matches && matches.length) {
      matches.forEach((elem) => {
        elem.addEventListener(
          event,
          function () {
            fn(elem)
          },
          false
        )
      })
    }
  }

y; it began accession membership talks with the European Union in 2005.&quot;],&quot;overview&quot;:[0,&quot;Turkey is a nation straddling eastern Europe and western Asia with cultural connections to ancient Greek Persian Roman Byzantine and Ottoman empires. Cosmopolitan Istanbul on the Bosphorus Strait is home to the iconic Hagia Sophia with its soaring dome and Christian mosaics the massive 17th-century Blue Mosque and the circa-1460 Topkapı Palace former home of sultans. Ankara is Turkey’s modern capital.&quot;],&quot;independent&quot;:[0,1],&quot;landmass_km&quot;:[0,769630],&quot;population_christian&quot;:[0,310000],&quot;population_christian_percentage&quot;:[0,0.2],&quot;population_refugee&quot;:[0,3579531],&quot;population_migration&quot;:[0,283922],&quot;population_year_change&quot;:[0,1.09],&quot;population_density_km&quot;:[0,110],&quot;population_average_age&quot;:[0,32],&quot;population_urban_percentage&quot;:[0,76],&quot;population_literacy_percentage&quot;:[0,96],&quot;region_code&quot;:[0,5],&quot;region_id&quot;:[0,145],&quot;region_name&quot;:[0,&quot;Western Asia&quot;],&quot;url_wiki&quot;:[0,&quot;https://en.wikipedia.org/wiki/Turkey&quot;],&quot;url_britannica&quot;:[0,&quot;https://www.britannica.com/place/Turkey&quot;],&quot;url_national_society&quot;:[0,&quot;https://www.kitabimukaddes.com/&quot;],&quot;url_ubs&quot;:[0,&quot;https://unitedbiblesocieties.org/locations/bible-society-in-turkey/&quot;],&quot;url_factbook&quot;:[0,&quot;https://www.cia.gov/the-world-factbook/countries/turkey/&quot;],&quot;url_factbook_pdf&quot;:[0,&quot;https://images.bible.cloud/maps/summary/TU-summary.pdf&quot;],&quot;url_human_development&quot;:[0,&quot;https://hdr.undp.org/data-center/specific-country-data#/countries/TUR&quot;],&quot;url_nations_online&quot;:[0,&quot;https://www.nationsonline.org/oneworld/turkey.htm&quot;],&quot;url_odp&quot;:[0,&quot;https://curlie.org/Regional/Middle_East/Turkey&quot;],&quot;url_operation_world&quot;:[0,&quot;https://oper
