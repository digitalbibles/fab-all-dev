const setDarkMode = () => {
    const isDarkModePreferred = () => {
        return localStorage.theme === "dark" ||
               (!("theme" in localStorage) && window.matchMedia("(prefers-color-scheme: dark)").matches);
    };

    const toggleClasses = (element, condition, classesOn, classesOff) => {
        classesOn.forEach(cls => element.classList.toggle(cls, condition));
        classesOff.forEach(cls => element.classList.toggle(cls, !condition));
    };

    const toggleDarkMode = () => {
        const isDark = document.documentElement.classList.toggle("dark");
        updateTogglerUI(isDark);
        localStorage.theme = isDark ? "dark" : "light";
    };

    const preferredDarkMode = isDarkModePreferred();
    document.documentElement.classList.toggle("dark", preferredDarkMode);
    attachEvent("[data-aw-toggle-color-scheme]", "click", toggleDarkMode);
};



    document.addEventListener("DOMContentLoaded", setDarkMode);

  function attachEvent(selector, event, fn) {
    const matches = document.querySelectorAll(selector)
    if (matches && matches.length) {
      matches.forEach((elem) => {
        elem.addEventListener(
          event,
          function () {
            fn(elem)
          },
          false
        )
      })
    }
  }

uot;],&quot;continent_id&quot;:[0,&quot;AS&quot;],&quot;iso_num&quot;:[0,764],&quot;language_count&quot;:[0,96],&quot;religion_primary&quot;:[0,&quot;Buddhism&quot;],&quot;introduction&quot;:[0,&quot;A unified Thai kingdom was established in the mid-14th century. Known as Siam until 1939 Thailand is the only Southeast Asian country never to have been colonized by a European power. A bloodless revolution in 1932 led to the establishment of a constitutional monarchy. In alliance with Japan during World War II Thailand became a US treaty ally in 1954 after sending troops to Korea and later fighting alongside the US in Vietnam. Thailand since 2005 has experienced several rounds of political turmoil including a military coup in 2006 that ousted then Prime Minister THAKSIN Chinnawat followed by large-scale street protests by competing political factions in 2008 2009 and 2010. THAKSIN&#39;s youngest sister YINGLAK Chinnawat in 2011 led the Puea Thai Party to an electoral win and assumed control of the government. A blanket amnesty bill for individuals involved in street protests altered at the last minute to include all political crimes - including all convictions against THAKSIN - triggered months of large-scale anti-government protests in Bangkok beginning in November 2013. In early May 2014 YINGLAK was removed from office by the Constitutional Court and in late May 2014 the Royal Thai Army staged a coup against the caretaker government. Then head of the Royal Thai Army Gen. PRAYUT Chan-ocha was appointed prime minister in August 2014. The interim military government created several interim institutions to promote reform and draft a new constitution. Elections are tentatively set for mid-2017. King PHUMIPHON Adunyadet passed away in October 2016 after 70 years on the throne; his only son WACHIRALONGKON Bodinthrathepphayawarangkun ascended the throne in December 2016. Thailand has also experienced violence associated with the ethno-nationalist insurgency in its southern Malay-Muslim majority provinces. Since January 2004 thousands have been killed and wounded in the insurgency.&quot;],&quot;overview&quot;:[0,&quot;&#39;Thailand is a Southeast Asian country. It&#39;&#39;s known for tropical beaches opulent royal palaces ancient ruins and ornate temples displaying figures of Buddha. In Bangkok the capital an ultramodern cityscape rises next to quiet canalside communities and the iconic temples of Wat Arun Wat Pho and the Emerald Buddha Temple (Wat Phra Kaew). Nearby beach resorts include bustling Pattaya and fashionable Hua Hin.&#39;&quot;],&quot;independent&quot;:[0,1],&quot;landmass_km&quot;:[0,510890],&quot;population_christian&quot;:[0,778000],&quot;population_christian_percentage&quot;:[0,1.2],&quot;population_catholic_percentage&quot;:[0,0.6],&quot;population_protestant_percentage&quot;:[0,0.6],&quot;population_refugee&quot;:[0,97571],&quot;population_migration&quot;:[0,19444],&quot;population_year_change&quot;:[0,0.25],&quot;population_density_km&quot;:[0,137],&quot;population_average_age&quot;:[0,40],&quot;population_urban_percentage&quot;:[0,51],&quot;population_literacy_percentage&quot;:[0,95],&quot;region_code&quot;:[0,2],&quot;region_id&quot;:[0,35],&quot;region_name&quot;:[0,&quot;South-eastern Asia&quot;],&quot;url_wiki&quot;:[0,&quot;https://en.wikipedia.org/wiki/Thailand&quot;],&quot;url_britannica&quot;:[0,&quot;https://www.britannica.com/place/Thailand&quot;],&quot;url_national_society&quot;:[0,&quot;http://www.thaibible.or.th/&quot;],&quot;url_ubs&quot;:[0,&quot;https://unitedbiblesocieties.org/locations/thailand-bible-society/&quot;],&quot;url_factbook&quot;:[0,&quot;https://www.cia.gov/the-world-factbook/countries/thailand/&quot;],&quot;url_factbook_pdf&quot;:[0,&quot;https://images.bible.cloud/maps/summary/TH-summary.pdf&quot;],&quot;url_human_development&quot;:[0,&quot;https://hdr.undp.org/data-center/specific-country-data#/countries/THA&quot;],&quot;url_nations_online&quot;:[0,&quot;https://www.nationsonline.or
