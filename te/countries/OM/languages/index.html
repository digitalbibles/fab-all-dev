const setDarkMode = () => {
    const isDarkModePreferred = () => {
        return localStorage.theme === "dark" ||
               (!("theme" in localStorage) && window.matchMedia("(prefers-color-scheme: dark)").matches);
    };

    const toggleClasses = (element, condition, classesOn, classesOff) => {
        classesOn.forEach(cls => element.classList.toggle(cls, condition));
        classesOff.forEach(cls => element.classList.toggle(cls, !condition));
    };

    const toggleDarkMode = () => {
        const isDark = document.documentElement.classList.toggle("dark");
        updateTogglerUI(isDark);
        localStorage.theme = isDark ? "dark" : "light";
    };

    const preferredDarkMode = isDarkModePreferred();
    document.documentElement.classList.toggle("dark", preferredDarkMode);
    attachEvent("[data-aw-toggle-color-scheme]", "click", toggleDarkMode);
};



    document.addEventListener("DOMContentLoaded", setDarkMode);

  function attachEvent(selector, event, fn) {
    const matches = document.querySelectorAll(selector)
    if (matches && matches.length) {
      matches.forEach((elem) => {
        elem.addEventListener(
          event,
          function () {
            fn(elem)
          },
          false
        )
      })
    }
  }

;OMN&quot;],&quot;continent_id&quot;:[0,&quot;AS&quot;],&quot;iso_num&quot;:[0,512],&quot;language_count&quot;:[0,36],&quot;religion_primary&quot;:[0,&quot;Islam&quot;],&quot;introduction&quot;:[0,&quot;The inhabitants of the area of Oman have long prospered from Indian Ocean trade. In the late 18th century the nascent sultanate in Muscat signed the first in a series of friendship treaties with Britain. Over time Oman&#39;s dependence on British political and military advisors increased although the Sultanate never became a British colony. In 1970 QABOOS bin Said Al-Said overthrew his father and has since ruled as sultan but he has not designated a successor. His extensive modernization program has opened the country to the outside world while preserving the longstanding close ties with the UK and US. Oman&#39;s moderate independent foreign policy has sought to maintain good relations with its neighbors and to avoid external entanglements. Inspired by the popular uprisings that swept the Middle East and North Africa beginning in January 2011 some Omanis staged demonstrations calling for more jobs and economic benefits and an end to corruption. In response to those protester demands QABOOS in 2011 pledged to implement economic and political reforms such as granting legislative and regulatory powers to the Majlis al-Shura and increasing unemployment benefits. Additionally in August 2012 the Sultan announced a royal directive mandating the speedy implementation of a national job creation plan for thousands of public and private sector Omani jobs. As part of the government&#39;s efforts to decentralize authority and allow greater citizen participation in local governance Oman successfully conducted its first municipal council elections in December 2012. Announced by the Sultan in 2011 the municipal councils have the power to advise the Royal Court on the needs of local districts across Oman&#39;s 11 governorates. The Sultan returned to Oman in March 2015 after eight months in Germany where he received medical treatment. He has since appeared publicly on a few occasions.&quot;],&quot;overview&quot;:[0,&quot;Oman a nation on the Arabian Peninsula has terrain encompassing desert riverbed oases and long coastlines on the Persian (Arabian) Gulf Arabian Sea and Gulf of Oman. Wahiba Sands is a region of dunes inhabited by Bedouins. The port capital Muscat is home to the massive contemporary Sultan Qaboos Grand Mosque and the old waterfront Muttrah quarter with a labyrinthine souk and busy fish market.&quot;],&quot;independent&quot;:[0,1],&quot;landmass_km&quot;:[0,309500],&quot;population_christian&quot;:[0,180000],&quot;population_christian_percentage&quot;:[0,6.5],&quot;population_refugee&quot;:[0,307],&quot;population_migration&quot;:[0,87400],&quot;population_year_change&quot;:[0,2.65],&quot;population_density_km&quot;:[0,16],&quot;population_average_age&quot;:[0,31],&quot;population_urban_percentage&quot;:[0,87],&quot;population_literacy_percentage&quot;:[0,99],&quot;region_code&quot;:[0,6],&quot;region_id&quot;:[0,145],&quot;region_name&quot;:[0,&quot;Western Asia&quot;],&quot;url_wiki&quot;:[0,&quot;https://en.wikipedia.org/wiki/Oman&quot;],&quot;url_britannica&quot;:[0,&quot;https://www.britannica.com/place/Oman&quot;],&quot;url_national_society&quot;:[0,&quot;http://www.bsgulf.org/&quot;],&quot;url_ubs&quot;:[0,&quot;https://unitedbiblesocieties.org/locations/oman/&quot;],&quot;url_factbook&quot;:[0,&quot;https://www.cia.gov/the-world-factbook/countries/oman/&quot;],&quot;url_factbook_pdf&quot;:[0,&quot;https://images.bible.cloud/maps/summary/MU-summary.pdf&quot;],&quot;url_human_development&quot;:[0,&quot;https://hdr.undp.org/data-center/specific-country-data#/countries/OMN&quot;],&quot;url_nations_online&quot;:[0,&quot;https://www.nationsonline.org/oneworld/oman.htm&quot;],&quot;url_odp&quot;:[0,&quot;https://curlie.org/Regional/Middle_East/Oman&quot;],&quot;url_operation_world&quot;:[0,&quot;https://operationworld.org/locatio
