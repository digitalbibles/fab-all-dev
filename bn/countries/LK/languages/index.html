const setDarkMode = () => {
    const isDarkModePreferred = () => {
        return localStorage.theme === "dark" ||
               (!("theme" in localStorage) && window.matchMedia("(prefers-color-scheme: dark)").matches);
    };

    const toggleClasses = (element, condition, classesOn, classesOff) => {
        classesOn.forEach(cls => element.classList.toggle(cls, condition));
        classesOff.forEach(cls => element.classList.toggle(cls, !condition));
    };

    const toggleDarkMode = () => {
        const isDark = document.documentElement.classList.toggle("dark");
        updateTogglerUI(isDark);
        localStorage.theme = isDark ? "dark" : "light";
    };

    const preferredDarkMode = isDarkModePreferred();
    document.documentElement.classList.toggle("dark", preferredDarkMode);
    attachEvent("[data-aw-toggle-color-scheme]", "click", toggleDarkMode);
};

  function attachEvent(selector, event, fn) {
    const matches = document.querySelectorAll(selector)

      matches.forEach((elem) => {
        elem.addEventListener(
          event,
          function () {
            fn(elem)
          },
          false

    }

iso_a3&quot;:[0,&quot;LKA&quot;],&quot;continent_id&quot;:[0,&quot;AS&quot;],&quot;iso_num&quot;:[0,144],&quot;language_count&quot;:[0,28],&quot;religion_primary&quot;:[0,&quot;Buddhism&quot;],&quot;introduction&quot;:[0,&quot;The first Sinhalese arrived in Sri Lanka late in the 6th century B.C. probably from northern India. Buddhism was introduced in about the mid-third century B.C. and a great civilization developed at the cities of Anuradhapura (kingdom from circa 200 B.C. to circa A.D. 1000) and Polonnaruwa (from about 1070 to 1200). In the 14th century a south Indian dynasty established a Tamil kingdom in northern Sri Lanka. The coastal areas of the island were controlled by the Portuguese in the 16th century and by the Dutch in the 17th century. The island was ceded to the British in 1796 became a crown colony in 1802 and was formally united under British rule by 1815. As Ceylon it became independent in 1948; its name was changed to Sri Lanka in 1972. Tensions between the Sinhalese majority and Tamil separatists erupted into war in 1983. After two decades of fighting the government and Liberation Tigers of Tamil Eelam (LTTE) formalized a cease-fire in February 2002 with Norway brokering peace negotiations. Violence between the LTTE and government forces intensified in 2006 but the government regained control of the Eastern Province in 2007. By May 2009 the government announced that its military had defeated the remnants of the LTTE. Since the end of the conflict the government has enacted an ambitious program of economic development projects many of which are financed by loans from the Government of China. In addition to efforts to reconstruct its economy the government has resettled more than 95% of those civilians who were displaced during the final phase of the conflict and released the vast majority of former LTTE combatants captured by Government Security Forces. At the same time there has been little progress on more contentious and politically difficult issues such as reaching a political settlement with Tamil elected representatives and holding accountable those alleged to have been involved in human rights violations and other abuses during the conflict.&quot;],&quot;overview&quot;:[0,&quot;&#39;Sri Lanka (formerly Ceylon) is an island nation south of India in the Indian Ocean. Its diverse landscapes range from rainforest and arid plains to highlands and sandy beaches. It’s famed for its ancient Buddhist ruins including the 5th-century citadel Sigiriya with its palace and frescoes. The city of Anuradhapura Sri Lanka&#39;&#39;s ancient capital has many ruins dating back more than 2000 years.&#39;&quot;],&quot;independent&quot;:[0,1],&quot;landmass_km&quot;:[0,62710],&quot;population_christian&quot;:[0,1531000],&quot;population_christian_percentage&quot;:[0,7.5],&quot;population_catholic_percentage&quot;:[0,6.1],&quot;population_protestant_percentage&quot;:[0,1.4],&quot;population_refugee&quot;:[0,1045],&quot;population_migration&quot;:[0,-97986],&quot;population_year_change&quot;:[0,0.42],&quot;population_density_km&quot;:[0,341],&quot;population_average_age&quot;:[0,34],&quot;population_urban_percentage&quot;:[0,18],&quot;population_literacy_percentage&quot;:[0,95],&quot;region_code&quot;:[0,4],&quot;region_id&quot;:[0,34],&quot;region_name&quot;:[0,&quot;Southern Asia&quot;],&quot;url_wiki&quot;:[0,&quot;https://en.wikipedia.org/wiki/Sri_Lanka&quot;],&quot;url_britannica&quot;:[0,&quot;https://www.britannica.com/place/Sri-Lanka&quot;],&quot;url_national_society&quot;:[0,&quot;http://www.ceylonbiblesociety.org/&quot;],&quot;url_ubs&quot;:[0,&quot;https://unitedbiblesocieties.org/locations/ceylon-bible-society/&quot;],&quot;url_factbook&quot;:[0,&quot;https://www.cia.gov/the-world-factbook/countries/sri-lanka/&quot;],&quot;url_factbook_pdf&quot;:[0,&quot;https://images.bible.cloud/maps/summary/CE-summary.pdf&quot;],&quot;url_human_development&quot;:[0,&quot;https://hdr.undp.org/data-center/specific-country-data#/
