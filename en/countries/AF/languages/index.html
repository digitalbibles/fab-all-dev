const setDarkMode = () => {
    const isDarkModePreferred = () => {
        return localStorage.theme === "dark" ||
               (!("theme" in localStorage) && window.matchMedia("(prefers-color-scheme: dark)").matches);
    };

    const toggleClasses = (element, condition, classesOn, classesOff) => {
        classesOn.forEach(cls => element.classList.toggle(cls, condition));
        classesOff.forEach(cls => element.classList.toggle(cls, !condition));
    };

    const toggleDarkMode = () => {
        const isDark = document.documentElement.classList.toggle("dark");
        updateTogglerUI(isDark);
        localStorage.theme = isDark ? "dark" : "light";
    };

    const preferredDarkMode = isDarkModePreferred();
    document.documentElement.classList.toggle("dark", preferredDarkMode);
    attachEvent("[data-aw-toggle-color-scheme]", "click", toggleDarkMode);
};



    document.addEventListener("DOMContentLoaded", setDarkMode);

  function attachEvent(selector, event, fn) {
    const matches = document.querySelectorAll(selector)
    if (matches && matches.length) {
      matches.forEach((elem) => {
        elem.addEventListener(
          event,
          function () {
            fn(elem)
          },
          false
        )
      })
    }
  }

;iso_a3&quot;:[0,&quot;AFG&quot;],&quot;continent_id&quot;:[0,&quot;AS&quot;],&quot;iso_num&quot;:[0,4],&quot;language_count&quot;:[0,66],&quot;religion_primary&quot;:[0,&quot;Islam&quot;],&quot;introduction&quot;:[0,&quot;Ahmad Shah DURRANI unified the Pashtun tribes and founded Afghanistan in 1747. The country served as a buffer between the British and Russian Empires until it won independence from notional British control in 1919. A brief experiment in democracy ended in a 1973 coup and a 1978 communist countercoup. The Soviet Union invaded in 1979 to support the tottering Afghan communist regime touching off a long and destructive war. The USSR withdrew in 1989 under relentless pressure by internationally supported anti-communist mujahidin rebels. A series of subsequent civil wars saw Kabul finally fall in 1996 to the Taliban a hardline Pakistani-sponsored movement that emerged in 1994 to end the country&#39;s civil war and anarchy. Following the 11 September 2001 terrorist attacks a US Allied and anti-Taliban Northern Alliance military action toppled the Taliban for sheltering Usama BIN LADIN. ++ A UN-sponsored Bonn Conference in 2001 established a process for political reconstruction that included the adoption of a new constitution a presidential election in 2004 and National Assembly elections in 2005. In December 2004 Hamid KARZAI became the first democratically elected president of Afghanistan and the National Assembly was inaugurated the following December. KARZAI was reelected in August 2009 for a second term. The 2014 presidential election was the country&#39;s first to include a runoff which featured the top two vote-getters from the first round Abdullah ABDULLAH and Ashraf GHANI. Throughout the summer of 2014 their campaigns disputed the results and traded accusations of fraud leading to a US-led diplomatic intervention that included a full vote audit as well as political negotiations between the two camps. In September 2014 GHANI and ABDULLAH agreed to form the Government of National Unity with GHANI inaugurated as president and ABDULLAH elevated to the newly-created position of chief executive officer. The day after the inauguration the GHANI administration signed the US-Afghan Bilateral Security Agreement and NATO Status of Forces Agreement which provide the legal basis for the post-2014 international military presence in Afghanistan. ++ Despite gains toward building a stable central government the Taliban remains a serious challenge for the Afghan Government in almost every province. The Taliban still considers itself the rightful government of Afghanistan and it remains a capable and confident insurgent force despite its last two spiritual leaders being killed; it continues to declare that it will pursue a peace deal with Kabul only after foreign military forces depart.&quot;],&quot;overview&quot;:[0,&quot;Afghanistan officially the Islamic Republic of Afghanistan is a landlocked country located within South Asia and Central Asia. Afghanistan is bordered by Pakistan in the south and east; Iran in the west; Turkmenistan Uzbekistan and Tajikistan in the north; and in the far northeast China. Its territory covers 652000 square kilometers (252000 sq mi) and much of it is covered by the Hindu Kush mountain range which experience very cold winters. The north consists of fertile plains whilst the south-west consists of deserts where temperatures can get very hot in summers.&quot;],&quot;independent&quot;:[0,1],&quot;landmass_km&quot;:[0,652860],&quot;population_christian&quot;:[0,30000],&quot;population_christian_percentage&quot;:[0,0.1],&quot;population_refugee&quot;:[0,72228],&quot;population_migration&quot;:[0,-62920],&quot;population_year_change&quot;:[0,2.33],&quot;population_density_km&quot;:[0,60],&quot;population_average_age&quot;:[0,18],&quot;population_urban_percentage&quot;:[0,25],&quot;population_literacy_percentage&quot;:[0,32],&quot;region_code&quot;:[0,5],&quot;region_id&quot;:[0,34],&quot;region_nam
