const setDarkMode = () => {
    const isDarkModePreferred = () => {
        return localStorage.theme === "dark" ||
               (!("theme" in localStorage) && window.matchMedia("(prefers-color-scheme: dark)").matches);
    };

    const toggleClasses = (element, condition, classesOn, classesOff) => {
        classesOn.forEach(cls => element.classList.toggle(cls, condition));
        classesOff.forEach(cls => element.classList.toggle(cls, !condition));
    };

    const toggleDarkMode = () => {
        const isDark = document.documentElement.classList.toggle("dark");
        updateTogglerUI(isDark);
        localStorage.theme = isDark ? "dark" : "light";
    };

    const preferredDarkMode = isDarkModePreferred();
    document.documentElement.classList.toggle("dark", preferredDarkMode);
    attachEvent("[data-aw-toggle-color-scheme]", "click", toggleDarkMode);
};



    document.addEventListener("DOMContentLoaded", setDarkMode);

  function attachEvent(selector, event, fn) {
    const matches = document.querySelectorAll(selector)
    if (matches && matches.length) {
      matches.forEach((elem) => {
        elem.addEventListener(
          event,
          function () {
            fn(elem)
          },
          false
        )
      })
    }
  }

3&quot;:[0,&quot;CIV&quot;],&quot;continent_id&quot;:[0,&quot;AF&quot;],&quot;iso_num&quot;:[0,384],&quot;language_count&quot;:[0,108],&quot;religion_primary&quot;:[0,&quot;Islam&quot;],&quot;introduction&quot;:[0,&quot;Close ties to France following independence in 1960 the development of cocoa production for export and foreign investment all made Cote d&#39;Ivoire one of the most prosperous of the West African states but did not protect it from political turmoil. In December 1999 a military coup - the first ever in Cote d&#39;Ivoire&#39;s history - overthrew the government. Junta leader Robert GUEI blatantly rigged elections held in late 2000 and declared himself the winner. Popular protest forced him to step aside and brought Laurent GBAGBO into power. Ivorian dissidents and disaffected members of the military launched a failed coup attempt in September 2002 that developed into a rebellion and then a civil war. The war ended in 2003 with a cease fire that left the country divided with the rebels holding the north the government the south and peacekeeping forces a buffer zone between the two. In March 2007 President GBAGBO and former New Forces rebel leader Guillaume SORO signed an agreement in which SORO joined GBAGBO&#39;s government as prime minister and the two agreed to reunite the country by dismantling the buffer zone integrating rebel forces into the national armed forces and holding elections. Difficulties in preparing electoral registers delayed balloting until 2010. In November 2010 Alassane Dramane OUATTARA won the presidential election over GBAGBO but GBAGBO refused to hand over power resulting in a five-month stand-off. In April 2011 after widespread fighting GBAGBO was formally forced from office by armed OUATTARA supporters with the help of UN and French forces. Several thousand UN peacekeepers and several hundred French troops remain in Cote d&#39;Ivoire to support the transition process. OUATTARA is focused on rebuilding the country&#39;s infrastructure and military after the five months of post-electoral fighting and faces ongoing threats from GBAGBO supporters many of whom have sought shelter in Ghana. GBAGBO is in The Hague awaiting trial for crimes against humanity.&quot;],&quot;overview&quot;:[0,&quot;&#39;Côte d&#39;&#39;Ivoire is a West African country with beach resorts rainforests and a French-colonial legacy. Abidjan on the Atlantic coast is the country’s major urban center. Its modern landmarks include zigguratlike concrete La Pyramide and St. Paul&#39;&#39;s Cathedral a swooping structure tethered to a massive cross. North of the central business district Banco National Park is a rainforest preserve with hiking trails.&#39;&quot;],&quot;independent&quot;:[0,1],&quot;landmass_km&quot;:[0,55960],&quot;population_christian&quot;:[0,7075000],&quot;population_christian_percentage&quot;:[0,32.8],&quot;population_catholic_percentage&quot;:[0,28.9],&quot;population_protestant_percentage&quot;:[0,3.9],&quot;population_refugee&quot;:[0,2021],&quot;population_migration&quot;:[0,-8001],&quot;population_year_change&quot;:[0,-0.61],&quot;population_density_km&quot;:[0,73],&quot;population_average_age&quot;:[0,44],&quot;population_urban_percentage&quot;:[0,58],&quot;population_literacy_percentage&quot;:[0,57],&quot;region_code&quot;:[0,8],&quot;region_id&quot;:[0,202],&quot;region_name&quot;:[0,&quot;Sub-Saharan Africa&quot;],&quot;url_wiki&quot;:[0,&quot;https://en.wikipedia.org/wiki/Ivory_Coast&quot;],&quot;url_britannica&quot;:[0,&quot;https://www.britannica.com/place/Cote-dIvoire&quot;],&quot;url_factbook&quot;:[0,&quot;https://www.cia.gov/the-world-factbook/countries/cote-divoire/&quot;],&quot;url_factbook_pdf&quot;:[0,&quot;https://images.bible.cloud/maps/summary/IV-summary.pdf&quot;],&quot;url_human_development&quot;:[0,&quot;https://hdr.undp.org/data-center/specific-country-data#/countries/CIV&quot;],&quot;url_nations_online&quot;:[0,&quot;https://www.nationsonline.org/oneworld/cote_d_ivoire.htm&quot;]
