const setDarkMode = () => {
    const isDarkModePreferred = () => {
        return localStorage.theme === "dark" ||
               (!("theme" in localStorage) && window.matchMedia("(prefers-color-scheme: dark)").matches);
    };

    const toggleClasses = (element, condition, classesOn, classesOff) => {
        classesOn.forEach(cls => element.classList.toggle(cls, condition));
        classesOff.forEach(cls => element.classList.toggle(cls, !condition));
    };

    const toggleDarkMode = () => {
        const isDark = document.documentElement.classList.toggle("dark");
        updateTogglerUI(isDark);
        localStorage.theme = isDark ? "dark" : "light";
    };

    const preferredDarkMode = isDarkModePreferred();
    document.documentElement.classList.toggle("dark", preferredDarkMode);
    attachEvent("[data-aw-toggle-color-scheme]", "click", toggleDarkMode);
};



    document.addEventListener("DOMContentLoaded", setDarkMode);

  function attachEvent(selector, event, fn) {
    const matches = document.querySelectorAll(selector)
    if (matches && matches.length) {
      matches.forEach((elem) => {
        elem.addEventListener(
          event,
          function () {
            fn(elem)
          },
          false
        )
      })
    }
  }

uot;BHR&quot;],&quot;continent_id&quot;:[0,&quot;AS&quot;],&quot;iso_num&quot;:[0,48],&quot;language_count&quot;:[0,14],&quot;religion_primary&quot;:[0,&quot;Islam&quot;],&quot;introduction&quot;:[0,&quot;In 1783 the Sunni Al-Khalifa family took power in Bahrain. In order to secure these holdings it entered into a series of treaties with the UK during the 19th century that made Bahrain a British protectorate. The archipelago attained its independence in 1971. A steady decline in oil production and reserves since 1970 prompted Bahrain to take steps to diversify its economy in the process developing successful petroleum processing and refining aluminum production and hospitality and retail sectors and also to become a leading regional banking center especially with respect to Islamic finance. Bahrain&#39;s small size and central location among Gulf countries require it to play a delicate balancing act in foreign affairs among its larger neighbors. ++ The Sunni-led government has long struggled to manage relations with its large Shia-majority population. In early 2011 amid Arab uprisings elsewhere in the region the Bahraini Government confronted similar pro-democracy and reform protests at home with police and military action including deploying Gulf Cooperation Council security forces to Bahrain. Political talks throughout 2014 between the government and opposition and loyalist political groups failed to reach an agreement prompting opposition political societies to boycott parliamentary and municipal council elections in late 2014. Ongoing dissatisfaction with the political status quo continues to factor into sporadic clashes between demonstrators and security forces.&quot;],&quot;overview&quot;:[0,&quot;&#39;Bahrain a nation comprising more than 30 islands in the Arabian Gulf has been at the center of major trade routes since antiquity. In its modern capital Manama the acclaimed Bahrain National Museum showcases artifacts from the ancient Dilmun civilization that flourished in the region for millennia. The city&#39;&#39;s thriving Bab al-Bahrain bazaar offers wares ranging from colorful handwoven fabrics and spices to pearls.&#39;&quot;],&quot;independent&quot;:[0,1],&quot;landmass_km&quot;:[0,760],&quot;population_christian&quot;:[0,185000],&quot;population_christian_percentage&quot;:[0,15],&quot;population_protestant_percentage&quot;:[0,9],&quot;population_refugee&quot;:[0,255],&quot;population_migration&quot;:[0,47800],&quot;population_year_change&quot;:[0,3.68],&quot;population_density_km&quot;:[0,2239],&quot;population_average_age&quot;:[0,32],&quot;population_urban_percentage&quot;:[0,89],&quot;population_literacy_percentage&quot;:[0,95],&quot;region_code&quot;:[0,6],&quot;region_id&quot;:[0,145],&quot;region_name&quot;:[0,&quot;Western Asia&quot;],&quot;url_wiki&quot;:[0,&quot;https://en.wikipedia.org/wiki/Bahrain&quot;],&quot;url_britannica&quot;:[0,&quot;https://www.britannica.com/place/Bahrain&quot;],&quot;url_national_society&quot;:[0,&quot;http://www.bsgulf.org/&quot;],&quot;url_ubs&quot;:[0,&quot;https://unitedbiblesocieties.org/locations/bahrain/&quot;],&quot;url_factbook&quot;:[0,&quot;https://www.cia.gov/the-world-factbook/countries/bahrain/&quot;],&quot;url_factbook_pdf&quot;:[0,&quot;https://images.bible.cloud/maps/summary/BA-summary.pdf&quot;],&quot;url_human_development&quot;:[0,&quot;https://hdr.undp.org/data-center/specific-country-data#/countries/BHR&quot;],&quot;url_nations_online&quot;:[0,&quot;https://www.nationsonline.org/oneworld/bahrain.htm&quot;],&quot;url_odp&quot;:[0,&quot;https://curlie.org/Regional/Middle_East/Bahrain&quot;],&quot;url_operation_world&quot;:[0,&quot;https://operationworld.org/locations/bahrain&quot;],&quot;url_religious_freedom&quot;:[0,&quot;https://www.state.gov/countries-areas/bahrain/&quot;],&quot;url_joshua&quot;:[0,&quot;https://joshuaproject.net/countries/BH&quot;],&quot;url_prayercast&quot;:[0,&quot;https://prayercast.com/bahrain.html&quot;],&quot;url_prayercast_video&q
